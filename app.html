<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Run Coach</title><style>body{margin:0;background:#08080a;color:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.app{max-width:840px;margin:auto;padding:16px 16px 110px}header{position:sticky;top:0;background:#08080add;backdrop-filter:blur(14px);padding:12px 0;border-bottom:1px solid #26262e}.brand{font-size:26px;font-weight:900;letter-spacing:-1px}.sub{color:#999;font-weight:700;font-size:13px}.tabs{display:flex;gap:8px;margin-top:14px;overflow:auto}button{border:0;border-radius:999px;padding:12px 16px;background:#202027;color:white;font-weight:900;min-height:46px}.active,.primary{background:white;color:#000}.card{background:#15151a;border:1px solid #2b2b34;border-radius:24px;padding:18px;margin:14px 0}.hero{background:linear-gradient(135deg,#fff,#bac3d6);color:#000}.hero .muted{color:#333}.title{font-size:42px;font-weight:1000;letter-spacing:-2px;margin:12px 0}.miles{font-size:70px;font-weight:1000;letter-spacing:-5px}.muted{color:#999}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#101014;border:1px solid #2b2b34;border-radius:18px;padding:14px}.stat b{font-size:24px;display:block}.stat span{color:#999;text-transform:uppercase;font-size:11px;font-weight:900}.day{display:grid;grid-template-columns:52px 1fr auto;gap:10px;padding:14px 0;border-top:1px solid #2b2b34}.day:first-child{border-top:0}.dow{font-weight:1000;font-size:19px}.mi{font-size:22px;font-weight:1000}.pill{display:inline-block;border-radius:999px;background:#253;padding:6px 10px;font-size:12px;font-weight:900}.field label{display:block;color:#aaa;font-size:12px;font-weight:900;margin:0 0 6px}input,select{width:100%;background:#101014;color:white;border:1px solid #2b2b34;border-radius:16px;padding:13px;font:inherit}.bottom{position:fixed;bottom:0;left:0;right:0;background:#08080add;border-top:1px solid #26262e;padding:10px 14px}.bottom div{max-width:840px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}@media(max-width:700px){.grid{grid-template-columns:1fr}.day{grid-template-columns:44px 1fr}.mi{grid-column:2}.miles{font-size:62px}}</style></head><body><div class="app"><header><div class="brand">↗ Run Coach</div><div class="sub">daily plan, simple logging</div><div class="tabs"><button id="btoday" onclick="tab('today')">Today</button><button id="bweek" onclick="tab('week')">Week</button><button id="bsetup" onclick="tab('setup')">Setup</button><button id="bplan" onclick="tab('plan')">Plan</button><button id="blog" onclick="tab('log')">Log</button></div></header><main id="today"></main><main id="week" class="hidden"></main><main id="setup" class="hidden"></main><main id="plan" class="hidden"></main><main id="log" class="hidden"></main></div><div class="bottom"><div><button class="primary" onclick="tab('log')">Log</button><button onclick="tab('setup')">Setup</button></div></div><script>
var KEY='runCoachLaptop7',D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],now=new Date(),S=load(),P=[];
function def(){return{tab:'today',start:ymd(now),current:0,cap:60,long:0,days:5,offSun:true,fitness:'effort',easy:'',logs:[]}}
function load(){var d=def();try{var s=JSON.parse(localStorage.getItem(KEY)||'{}');for(var k in s)d[k]=s[k]}catch(e){}return d}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}function ymd(d){var x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function dt(s){var d=new Date((s||ymd(now))+'T12:00:00');return isNaN(d)?new Date():d}function add(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){var x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}function num(v,f){var x=parseFloat(v);return isNaN(x)?f:x}function half(x){return Math.round(x*2)/2}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function fmt(s){return dt(s).toLocaleDateString([],{month:'short',day:'numeric'})}function pace(){return S.fitness==='easy'&&S.easy?S.easy+'/mi':'conversational'}
function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,pcts=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1],i,target;P=[];for(i=1;i<=16;i++){if(i%4===0)target=Math.round(P[i-2].miles*.78);else if(restart&&pcts[i-1])target=Math.round(cap*pcts[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));target=clamp(target,restart?12:10,cap);P.push(week(i,start,target,restart))}}
function days(){var a=S.offSun?[1,2,3,4,5,6]:[1,2,3,4,5,6,0];return a.slice(0,Math.max(3,Math.min(6,num(S.days,5))))}function week(i,start,total,restart){var ds=days(),ld=ds.indexOf(6)>=0?6:ds[ds.length-1],phase=restart&&i<=3?'Restart foundation':i<=5?'Foundation + strides':i<=8?'Aerobic strength':total>=38?'Threshold + economy':'Threshold foundation',lr=half(clamp(Math.min(total*.25,4+i*.8),total>=20?5:4,Math.min(16,total*.3))),rem=total-lr,min=total<18?3:4,vals={},j,d;for(j=0;j<ds.length;j++){d=ds[j];if(d!==ld){vals[d]=min;rem-=min}}for(j=0;j<ds.length;j++){d=ds[j];if(d!==ld&&rem>0){vals[d]+=1;rem--}}vals[ld]=half(lr+rem);var out=[];for(d=0;d<7;d++){var m=vals[d]||0,type='Off',name='Off',det='Off',why='Recover';if(m>0){type='E';name='Easy';det=m+' mi easy';why='Easy pace '+pace()+'. HR 65–78%.';if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';name='Easy + strides';det=m+' mi easy + 4–8 × 20 sec strides';why='Fast relaxed, full recovery.'}if(i>=6&&total>=28&&d===2){type=phase==='Aerobic strength'?'Fartlek':'T';name=type==='T'?'Threshold':'Fartlek';det=type==='T'?'4–6 × 5 min T, 90 sec jog':'8–10 × 1 min on / 1 min easy';why=type==='T'?'Comfortably hard, controlled.':'Controlled aerobic power.'}if(d===ld){type='L';name='Long run';det=m+' mi long';why='Easy relaxed, do not race it.'}}out.push({date:ymd(add(start,(i-1)*7+d)),day:D[d],miles:half(m),type:type,name:name,det:det,why:why,phase:phase})}var sum=0;for(j=0;j<out.length;j++)sum+=out[j].miles;return{i:i,miles:half(sum),phase:phase,days:out}}
function currentWeek(){build();var t=ymd(now),i,j;for(i=0;i<P.length;i++)for(j=0;j<P[i].days.length;j++)if(P[i].days[j].date===t)return P[i];return P[0]}function todayRun(){var w=currentWeek(),t=ymd(now),i;for(i=0;i<w.days.length;i++)if(w.days[i].date===t)return w.days[i];for(i=0;i<w.days.length;i++)if(w.days[i].miles>0)return w.days[i];return w.days[0]}
function render(){build();['today','week','setup','plan','log'].forEach(function(x){document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}
function renderToday(){var r=todayRun(),w=currentWeek(),pct=clamp(w.miles/num(S.cap,60)*100,4,100);today.innerHTML='<div class="card hero"><span class="pill">'+fmt(r.date)+' · '+r.phase+'</span><div class="title">'+r.name+'</div><div class="miles">'+r.miles+' mi</div><div class="work">'+r.det+'</div></div><div class="card"><h2>Target</h2><div class="title" style="font-size:30px">'+(r.type==='L'?'Long: easy relaxed':r.type==='T'?'T: comfortably hard':'Easy: '+pace())+'</div><p>'+r.why+'</p></div><div class="card"><b>This week: '+w.miles+' mi</b><span style="float:right">Cap '+S.cap+'</span><div class="bar" style="margin-top:12px"><div class="fill" style="width:'+pct+'%"></div></div></div>'}
function dayHTML(r){return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="muted">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill">'+r.type+'</span><div class="details">'+r.det+'</div><div class="muted">'+r.why+'</div></div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=currentWeek(),s='<div class="card"><h2>'+w.miles+' mi week</h2><p>'+w.phase+'</p>';for(var i=0;i<w.days.length;i++)s+=dayHTML(w.days[i]);week.innerHTML=s+'</div>'}function renderPlan(){var s='';for(var i=0;i<P.length;i++)s+='<div class="card"><h2>Week '+P[i].i+': '+P[i].miles+' mi</h2><p>'+P[i].phase+'</p></div>';plan.innerHTML=s}
function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Comfortable long run</label><input id="long" type="number" value="'+S.long+'"></div><div class="field"><label>Days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div><div class="field"><label>Pace source</label><select id="fit"><option value="effort">Effort / HR</option><option value="easy">Easy pace</option></select></div><div class="field"><label>Easy pace optional</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p><button class="primary" onclick="saveSetup()">Build plan</button></div>';document.getElementById('days').value=S.days;document.getElementById('fit').value=S.fitness}function saveSetup(){S.current=num(cur.value,0);S.cap=num(cap.value,60);S.long=num(long.value,0);S.days=num(document.getElementById('days').value,5);S.fitness=fit.value;S.easy=easy.value;save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}
function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.det+'</p><div class="field"><label>Miles</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><div class="grid"><button onclick="quick(\'easy\')">Easy</button><button onclick="quick(\'normal\')">Normal</button><button onclick="quick(\'hard\')">Hard</button><button onclick="quick(\'bad\')">Bad / Pain</button></div></div><div class="card"><h2>Recent</h2>'+recent()+'</div>'}function quick(e){S.logs.push({date:ymd(now),miles:num(lm.value,0),effort:e});save();tab('today')}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';var s='',i;for(i=S.logs.length-1;i>=0&&i>S.logs.length-7;i--)s+='<p><b>'+S.logs[i].date+'</b> · '+S.logs[i].miles+' mi · '+S.logs[i].effort+'</p>';return s}
try{if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister()})}catch(e){}render();
</script></body></html>
