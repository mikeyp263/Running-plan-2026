<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Run Coach</title>
<style>
:root{--bg:#08080a;--card:#15151a;--card2:#1e1e24;--ink:#f7f7f8;--muted:#a1a1aa;--line:#2b2b34;--green:#56df8f;--yellow:#ffd15c;--blue:#8ab4ff;--red:#ff7575;--r:24px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#202026,#08080a 46%,#050506);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif}.app{max-width:880px;margin:auto;padding:16px 16px 116px}header{position:sticky;top:0;z-index:10;background:rgba(8,8,10,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);margin:0 -16px 16px;padding:12px 16px}.brand{font-size:26px;font-weight:1000;letter-spacing:-1.2px}.sub{color:var(--muted);font-size:13px;font-weight:800}.tabs{display:flex;gap:8px;margin-top:14px;overflow:auto}button{border:0;border-radius:999px;padding:12px 16px;background:var(--card2);color:white;font-weight:900;min-height:46px;font-size:14px}.active,.primary{background:white;color:#000}.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:18px;margin:12px 0}.hero{background:linear-gradient(135deg,#fff,#bec8dc);color:#030303;border:0;padding:24px}.chip{display:inline-block;background:rgba(255,255,255,.55);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;color:#333}.title{font-size:42px;line-height:1;font-weight:1000;letter-spacing:-2px;margin:18px 0 8px}.miles{font-size:72px;line-height:.9;font-weight:1000;letter-spacing:-5px}.work{font-size:21px;font-weight:850;margin-top:16px}.muted,p{color:var(--muted)}h2{margin:0 0 10px;font-size:24px;letter-spacing:-1px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#101014;border:1px solid var(--line);border-radius:18px;padding:14px}.stat b{font-size:25px;display:block;letter-spacing:-1px}.stat span{color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:1000;letter-spacing:.06em}.paceMain{font-size:32px;font-weight:1000;letter-spacing:-1.4px}.bar{height:10px;background:#292932;border-radius:999px;overflow:hidden}.fill{height:100%;background:white;border-radius:999px}.pill{display:inline-block;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;background:rgba(255,255,255,.1)}.green{background:rgba(86,223,143,.18);color:#c8f8d9}.yellow{background:rgba(255,209,92,.18);color:#ffe7a8}.blue{background:rgba(138,180,255,.18);color:#d3e1ff}.red{background:rgba(255,117,117,.18);color:#ffd1d1}.day{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:14px 0;border-top:1px solid rgba(255,255,255,.07)}.day:first-child{border-top:0}.dow{font-size:19px;font-weight:1000}.date{font-size:11px;color:var(--muted);font-weight:900}.mi{font-size:22px;font-weight:1000;text-align:right}.details{font-size:15px;color:#eee;margin-top:3px}.target{font-size:12px;color:var(--muted);margin-top:4px}.field label{display:block;color:var(--muted);font-size:12px;font-weight:900;margin-bottom:6px}input,select{width:100%;background:#101014;color:white;border:1px solid var(--line);border-radius:16px;padding:13px;font:inherit;min-height:50px}.choice{border:1px solid var(--line);background:#111114;border-radius:18px;padding:14px;text-align:left;min-height:72px}.choice.active{background:#fff;color:#000}.choice b{display:block}.choice span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.choice.active span{color:#444}.seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 14px}.seg button{border:1px solid var(--line);background:#111114;border-radius:18px;min-height:58px}.seg button.active{background:white;color:#000}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(8,8,10,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottom div{max-width:880px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}@media(max-width:700px){.app{padding:12px 12px 112px}header{margin:0 -12px 14px;padding:12px}.grid,.grid3{grid-template-columns:1fr}.title{font-size:36px}.miles{font-size:64px}.paceMain{font-size:28px}.seg{grid-template-columns:repeat(2,1fr)}.day{grid-template-columns:44px 1fr}.mi{grid-column:2;text-align:left}}
</style>
</head>
<body>
<div class="app"><header><div class="brand">↗ Run Coach</div><div class="sub">today, paces, simple logging</div><div class="tabs"><button id="btoday" onclick="tab('today')">Today</button><button id="bweek" onclick="tab('week')">Week</button><button id="bsetup" onclick="tab('setup')">Setup</button><button id="bplan" onclick="tab('plan')">Plan</button><button id="blog" onclick="tab('log')">Log</button></div></header><main id="today"></main><main id="week" class="hidden"></main><main id="setup" class="hidden"></main><main id="plan" class="hidden"></main><main id="log" class="hidden"></main></div><div class="bottom"><div><button class="primary" onclick="tab('log')">Log</button><button onclick="tab('setup')">Setup</button></div></div>
<script>
var KEY='runCoachClean8',D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],now=new Date(),S=load(),P=[],draft={effort:'normal',pain:'none',sleep:'good'};
function def(){return{tab:'today',start:ymd(now),current:0,cap:60,long:0,days:5,offSun:true,fitness:'effort',easy:'',testDist:'5K',testTime:'',logs:[]}}
function load(){var d=def();try{var s=JSON.parse(localStorage.getItem(KEY)||'{}');for(var k in s)d[k]=s[k]}catch(e){}return d}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function ymd(d){var x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function dt(s){var d=new Date((s||ymd(now))+'T12:00:00');return isNaN(d)?new Date():d}function add(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){var x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}function num(v,f){var x=parseFloat(v);return isNaN(x)?f:x}function half(x){return Math.round(x*2)/2}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function fmt(s){return dt(s).toLocaleDateString([],{month:'short',day:'numeric'})}function paceSec(p){if(!p)return null;var m=String(p).match(/(\d+):([0-5]?\d)/);return m?Number(m[1])*60+Number(m[2]):null}function secPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeSec(t){if(!t)return null;var a=String(t).split(':'),i,total=0;if(a.length<2)return null;for(i=0;i<a.length;i++){if(isNaN(Number(a[i])))return null;total=total*60+Number(a[i])}return total}function dist(d){var m={mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219};return m[d]||3.107}
function paces(){var e=paceSec(S.easy),t=timeSec(S.testTime),di=dist(S.testDist);if(S.fitness==='easy'&&e)return{src:'Easy pace',E:secPace(e),LR:secPace(e+15),T:secPace(e-75),I:secPace(e-105),hr:'65–78%'};if(S.fitness==='test'&&t){var five=t*Math.pow(3.107/di,1.06),p=five/3.107;return{src:'Current test',E:secPace(p+105),LR:secPace(p+120),T:secPace(p+28),I:secPace(p+5),hr:'65–78%'}}return{src:'Effort / HR',E:'conversational',LR:'easy relaxed',T:'comfortably hard',I:'hard controlled',hr:'65–78%'}}
function days(){var a=S.offSun?[1,2,3,4,5,6]:[1,2,3,4,5,6,0];return a.slice(0,Math.max(3,Math.min(6,num(S.days,5))))}function phase(i,m,restart){if(restart&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=38&&i>=9)return'Threshold + economy';return'Threshold foundation'}
function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,pcts=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1],i,target;P=[];for(i=1;i<=16;i++){if(i%4===0)target=Math.round(P[i-2].miles*.78);else if(restart&&pcts[i-1])target=Math.round(cap*pcts[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));target=clamp(target,restart?12:10,cap);P.push(makeWeek(i,start,target,restart))}}
function makeWeek(i,start,total,restart){var p=paces(),ds=days(),ld=ds.indexOf(6)>=0?6:ds[ds.length-1],ph=phase(i,total,restart),lr=half(clamp(Math.min(total*.25,4+i*.8),total>=20?5:4,Math.min(16,total*.3))),rem=total-lr,min=total<18?3:4,vals={},normal=[],j,d;for(j=0;j<ds.length;j++)if(ds[j]!==ld)normal.push(ds[j]);for(j=0;j<normal.length;j++){vals[normal[j]]=min;rem-=min}for(j=0;j<normal.length&&rem>0;j=(j+1)%normal.length){vals[normal[j]]+=1;rem-=1}vals[ld]=half(lr+rem);var out=[];for(d=0;d<7;d++){var m=vals[d]||0,type='Off',name='Off',det='Off',why='Recovery day.';if(m>0){type='E';name='Easy';det=m+' mi easy';why='Easy '+p.E+' · HR '+p.hr;if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';name='Easy + strides';det=m+' mi easy + 4–8 × 20 sec strides';why='Easy '+p.E+' + fast relaxed strides.'}if(i>=6&&total>=28&&d===2){type=ph==='Aerobic strength'?'Fartlek':'T';name=type==='T'?'Threshold':'Fartlek';det=type==='T'?'4–6 × 5 min T, 90 sec jog':'8–10 × 1 min on / 1 min easy';why=type==='T'?'T '+p.T+' · controlled':'Hard '+p.I+' · controlled'}if(d===ld){type='L';name='Long run';det=m+' mi long';why='Long '+p.LR+' · controlled'}}out.push({date:ymd(add(start,(i-1)*7+d)),day:D[d],miles:half(m),type:type,name:name,det:det,why:why,phase:ph,pace:p})}var sum=0;for(j=0;j<out.length;j++)sum+=out[j].miles;return{i:i,miles:half(sum),phase:ph,days:out}}
function curWeek(){build();var t=ymd(now),i,j;for(i=0;i<P.length;i++)for(j=0;j<P[i].days.length;j++)if(P[i].days[j].date===t)return P[i];return P[0]}function todayRun(){var w=curWeek(),t=ymd(now),i;for(i=0;i<w.days.length;i++)if(w.days[i].date===t)return w.days[i];for(i=0;i<w.days.length;i++)if(w.days[i].miles>0)return w.days[i];return w.days[0]}
function target(r){if(r.type==='Off')return'No run';if(r.type==='L')return'Long: '+r.pace.LR;if(r.type==='T')return'Threshold: '+r.pace.T;if(r.type==='Fartlek')return'Hard reps: '+r.pace.I;return'Easy: '+r.pace.E}function col(r){if(r.type==='L')return'blue';if(r.type==='T'||r.type==='Fartlek')return'yellow';if(r.type==='Off')return'';return'green'}function render(){build();['today','week','setup','plan','log'].forEach(function(x){document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}
function renderToday(){var r=todayRun(),w=curWeek(),p=paces(),pct=clamp(w.miles/num(S.cap,60)*100,4,100);today.innerHTML='<div class="card hero"><span class="chip">'+fmt(r.date)+' · '+r.phase+'</span><div class="title">'+r.name+'</div><div class="miles">'+r.miles+' <span style="font-size:.42em">mi</span></div><div class="work">'+r.det+'</div></div><div class="card"><div class="paceMain">'+target(r)+'</div><p>'+r.why+'</p><span class="pill '+col(r)+'">'+r.type+'</span></div><div class="card"><div class="row" style="justify-content:space-between"><b>This week: '+w.miles+' mi</b><b>Cap '+S.cap+'</b></div><div class="bar" style="margin-top:10px"><div class="fill" style="width:'+pct+'%"></div></div></div><div class="grid3"><div class="stat"><b>'+p.E+'</b><span>easy</span></div><div class="stat"><b>'+p.T+'</b><span>threshold</span></div><div class="stat"><b>'+p.I+'</b><span>interval</span></div></div>'}
function dayHTML(r){return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="date">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill '+col(r)+'">'+r.type+'</span><div class="details">'+r.det+'</div><div class="target">'+target(r)+'</div></div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=curWeek(),s='<div class="card"><h2>'+w.miles+' mi week</h2><p>'+w.phase+'</p>';for(var i=0;i<w.days.length;i++)s+=dayHTML(w.days[i]);week.innerHTML=s+'</div>'}function renderPlan(){var s='';for(var i=0;i<P.length;i++)s+='<div class="card"><h2>Week '+P[i].i+': '+P[i].miles+' mi</h2><p>'+P[i].phase+'</p></div>';plan.innerHTML=s}
function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Comfortable long run</label><input id="long" type="number" value="'+S.long+'"></div><div class="field"><label>Days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p></div><div class="card"><h2>Paces</h2><div class="grid"><button class="choice '+(S.fitness==='effort'?'active':'')+'" onclick="S.fitness=\'effort\';save();render()"><b>Effort / HR</b><span>Use this if not race fit</span></button><button class="choice '+(S.fitness==='easy'?'active':'')+'" onclick="S.fitness=\'easy\';save();render()"><b>Easy pace</b><span>Enter current easy pace</span></button><button class="choice '+(S.fitness==='test'?'active':'')+'" onclick="S.fitness=\'test\';save();render()"><b>Current test</b><span>Recent time trial only</span></button><button class="choice"><b>Old PRs ignored</b><span>15:18 / 4:12 are history only</span></button></div><div class="grid" style="margin-top:12px"><div class="field"><label>Easy pace</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div><div class="field"><label>Test distance</label><select id="testDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field"><label>Test time</label><input id="testTime" value="'+S.testTime+'" placeholder="20:30"></div></div><button class="primary" onclick="saveSetup()" style="margin-top:12px">Build plan</button></div>';document.getElementById('days').value=S.days;document.getElementById('testDist').value=S.testDist}
function saveSetup(){S.current=num(cur.value,0);S.cap=num(cap.value,60);S.long=num(long.value,0);S.days=num(document.getElementById('days').value,5);S.easy=easy.value;S.testDist=testDist.value;S.testTime=testTime.value;save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}
function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.det+'</p><div class="field"><label>Miles</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><p>Feel</p><div class="seg"><button onclick="pick(\'effort\',\'easy\')">Easy</button><button onclick="pick(\'effort\',\'normal\')">Normal</button><button onclick="pick(\'effort\',\'hard\')">Hard</button><button onclick="pick(\'effort\',\'bad\')">Bad</button></div><p>Pain</p><div class="seg"><button onclick="pick(\'pain\',\'none\')">None</button><button onclick="pick(\'pain\',\'mild\')">Mild</button><button onclick="pick(\'pain\',\'moderate\')">Mod</button><button onclick="pick(\'pain\',\'bad\')">Bad</button></div><p>Sleep</p><div class="seg"><button onclick="pick(\'sleep\',\'good\')">Good</button><button onclick="pick(\'sleep\',\'okay\')">Ok</button><button onclick="pick(\'sleep\',\'bad\')">Bad</button><button onclick="quick(\'skipped\')">Skipped</button></div><button class="primary" onclick="saveLog()">Save + adapt</button></div><div class="card"><h2>Recent</h2>'+recent()+'</div>';refresh()}function pick(k,v){draft[k]=v;refresh()}function refresh(){var b=document.querySelectorAll('.seg button'),i,t;for(i=0;i<b.length;i++){t=b[i].textContent.toLowerCase();b[i].className='';if(t.indexOf(draft.effort)===0||t.indexOf(draft.pain)===0||t.indexOf(draft.sleep)===0)b[i].className='active'}}function saveLog(){S.logs.push({date:ymd(now),miles:num(lm.value,0),effort:draft.effort,pain:draft.pain,sleep:draft.sleep});save();tab('today')}function quick(e){S.logs.push({date:ymd(now),miles:0,effort:e,pain:'none',sleep:'good'});save();tab('today')}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';var s='',i;for(i=S.logs.length-1;i>=0&&i>S.logs.length-7;i--)s+='<p><b>'+S.logs[i].date+'</b> · '+S.logs[i].miles+' mi · '+S.logs[i].effort+' · pain '+S.logs[i].pain+'</p>';return s}
try{if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister()})}catch(e){}render();
</script>
</body></html>
