<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Run Coach</title><style>body{margin:0;background:#08080a;color:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.app{max-width:900px;margin:auto;padding:14px 14px 112px}header{position:sticky;top:0;background:#08080aee;backdrop-filter:blur(16px);border-bottom:1px solid #27272f;margin:0 -14px 14px;padding:12px 14px;z-index:10}.brand{font-size:26px;font-weight:1000}.sub,.now,p{color:#a1a1aa}.now{font-weight:900;margin-top:6px}.tabs{display:flex;gap:8px;margin-top:14px;overflow:auto}button{border:0;border-radius:999px;min-height:46px;padding:12px 15px;background:#1f1f26;color:white;font-weight:900}.active,.primary{background:white;color:#000}.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;margin:12px 0}.hero{background:linear-gradient(135deg,#fff,#bec8dc);color:#030303;border:0;padding:24px}.chip{display:inline-block;background:rgba(255,255,255,.58);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;color:#333}.title{font-size:40px;line-height:1;font-weight:1000;letter-spacing:-2px;margin:18px 0 8px}.miles{font-size:70px;line-height:.9;font-weight:1000;letter-spacing:-5px}.work{font-size:21px;font-weight:850;margin-top:16px}.pace{font-size:29px;font-weight:1000;letter-spacing:-1.3px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#101014;border:1px solid #2b2b34;border-radius:18px;padding:14px}.stat b{font-size:24px;display:block}.stat span{color:#a1a1aa;font-size:11px;text-transform:uppercase;font-weight:1000;letter-spacing:.06em}.meter{height:12px;background:#292932;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;background:white;border-radius:999px}.pill{display:inline-block;border-radius:999px;padding:7px column:2;text-align:left}}</style></head><body><div class="app"><header><div class="brand">↗ Run Coach</div><div class="sub">adaptive plan · smart logging · realistic long runs</div><div id="nowLine" class="now"></div><div class="tabs"><button id="btoday" onclick="tab('today')">Today</button><button id="bweek" onclick="tab('week')">Week</button><button id="bsetup" onclick="tab('setup')">Setup</button><button id="bplan" onclick="tab('plan')">Plan</button><button id="blog" onclick="tab('log')">Log</button></div></header><main id="today"></main><main id="week" class="hidden"></main><main id="setup" class="hidden"></main><main id="plan" class="hidden"></main><main id="log" class="hidden"></main></div><div class="bottom"><div><button class="primary" onclick="tab('log')">Log</button><button onclick="tab('setup')">Setup</button></div></div><script>
var KEY='runCoachAdaptive16',D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],now=new Date(),S=load(),P=[],draft={effort:'normal',pain:'none',sleep:'good'};
function def(){return{tab:'today',start:ymd(new Date()),current:0,cap:60,days:5,offSun:true,longDay:6,recentLong:0,fitness:'effort',easy:'',testDist:'5K',testTime:'',logs:[],adapt:{},notes:[]}}
function load(){var d=def();try{var s=JSON.parse(localStorage.getItem(KEY)||'{}');for(var k in s)d[k]=s[k]}catch(e){}return d}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function ymd(d){var x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function dt(s){var d=new Date((s||ymd(new Date()))+'T12:00:00');return isNaN(d)?new Date():d}function add(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){var x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}function num(v,f){var x=parseFloat(v);return isNaN(x)?f:x}function half(x){return Math.round(x*2)/2}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function fmt(s){return dt(s).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}function tick(){now=new Date();nowLine.textContent=now.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'})+' · '+now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}
function paceSec(p){if(!p)return null;var m=String(p).match(/(\d+):([0-5]?\d)/);return m?Number(m[1])*60+Number(m[2]):null}function secPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeSec(t){if(!t)return null;var a=String(t).split(':'),i,total=0;if(a.length<2)return null;for(i=0;i<a.length;i++){if(isNaN(Number(a[i])))return null;total=total*60+Number(a[i])}return total}function dist(d){var m={mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219};return m[d]||3.107}function paces(){var e=paceSec(S.easy),t=timeSec(S.testTime),di=dist(S.testDist);if(S.fitness==='easy'&&e)return{E:secPace(e),LR:secPace(e+15),M:secPace(e-35),T:secPace(e-75),I:secPace(e-105),R:'fast relaxed',hr:'65–78%'};if(S.fitness==='test'&&t){var five=t*Math.pow(3.107/di,1.06),p=five/3.107;return{E:secPace(p+105),LR:secPace(p+120),M:secPace(p+55),T:secPace(p+28),I:secPace(p+5),R:'fast relaxed',hr:'65–78%'}}return{E:'conversational',LR:'easy relaxed',M:'steady controlled',T:'comfortably hard',I:'hard controlled',R:'fast relaxed',hr:'65–78%'}}
function days(){var base=S.offSun?[1,2,3,4,5,6]:[1,2,3,4,5,6,0],out=[],i,ld=num(S.longDay,6),want=num(S.days,5);for(i=0;i<base.length&&out.length<want;i++)out.push(base[i]);if(out.indexOf(ld)<0){if(out.length>=want)out[out.length-1]=ld;else out.push(ld)}out.sort(function(a,b){return a-b});return out}function phase(i,m,restart){if(restart&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=42&&i>=10)return'Specific endurance';if(m>=34&&i>=8)return'Threshold + economy';return'Threshold foundation'}function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,pcts=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1],i,target;P=[];for(i=1;i<=16;i++){if(i%4===0||forceDown(i))target=Math.round(P[i-2]?P[i-2].miles*.78:cap*.3);else if(restart&&pcts[i-1])target=Math.round(cap*pcts[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));target=clamp(target,restart?12:10,cap);P.push(makeWeek(i,start,target,restart))}}
function weekIndex(date){return Math.floor((mon(dt(date))-mon(dt(S.start)))/604800000)+1}function logsThisWeek(){var m=mon(now),a=[],i;for(i=0;i<S.logs.length;i++){var d=dt(S.logs[i].date);if(mon(d).getTime()===m.getTime())a.push(S.logs[i])}return a}function loggedMilesThisWeek(){return logsThisWeek().reduce(function(s,l){return s+num(l.miles,0)},0)}function importantMiss(log,planned){var miss=Math.max(0,planned.miles-num(log.miles,0)),share=planned.weekMiles?miss/planned.weekMiles:0;if(log.skipped&&planned.type==='E'&&share<.10)return false;if(log.skipped&&planned.type==='Strides'&&share<.10)return false;return log.skipped||miss/planned.weekMiles>.15||planned.type.indexOf('L')===0||['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0}function badCountThisWeek(){return logsThisWeek().filter(function(l){return l.effort==='bad'||l.pain==='moderate'||l.pain==='bad'||l.sleep==='bad'}).length}function forceDown(i){return badCountThisWeek()>=2&&i===weekIndex(ymd(now))+1}
function pick(a,i){return a[i%a.length]}function longRunMiles(total,i,restart,down,prevLR){var pct=total<18?.22:total<30?.23:total<45?.24:total<60?.25:.26;if(down)pct-=.02;if(restart&&i<=3)pct=Math.min(pct,.22);var raw=total*pct,min=total<18?3.5:total<28?5:6,max=total<18?5:total<30?7:total<45?10.5:total<60?13.5:16,recent=num(S.recentLong,0);if(restart&&recent>0)max=Math.min(max,recent+i*1.5);if(prevLR>0)raw=Math.min(raw,prevLR+(down?0:1.5));var lr=half(clamp(raw,min,max)),otherDays=Math.max(2,num(S.days,5)-1);lr=Math.min(lr,half(total*.285));if(total-lr<otherDays*3)lr=half(total-otherDays*3);return half(Math.max(0,lr))}
function quality(i,ph,p){var early=[['Fartlek','Controlled fartlek','10 × 1 min on / 1 min easy','Controlled aerobic power.'],['Hills','Hill circuits','8 × 30 sec hill strong, jog down','Strength and mechanics.'],['Fartlek','Minute ladder','1-2-3-2-1 min on, equal easy jog','Controlled by feel.'],['Fartlek','Float fartlek','12 × 45 sec on / 75 sec float','Rhythm changes.']];var thresh=[['T','Cruise intervals','4–6 × 5 min T, 90 sec jog','Threshold volume.'],['T','Threshold miles','3–4 × 1 mi T, 60–90 sec jog','Classic cruise reps.'],['T','Broken tempo','2 × 12 min T, 3 min easy','Sustained threshold.'],['T','Tempo progression','20–25 min steady to T effort','Progression into threshold.'],['T','K reps','5–7 × 1K T, 60 sec jog','Threshold rhythm.']];var economy=[['I','3-minute reps','5–6 × 3 min I effort, equal jog','Aerobic power after base.'],['I','K intervals','5 × 1K at I effort, 2–3 min jog','Economy and power.'],['R','Fast relaxed reps','8–10 × 200m relaxed-fast, full recovery','Speed and mechanics.'],['Fartlek','5-4-3-2-1 fartlek','5-4-3-2-1 min hard controlled, equal easy','Strong but not all-out.']];var specific=[['T','Medium-long T','2 × 15 min T inside a medium run','Specific endurance.'],['M','Steady state','35–45 min steady controlled','Aerobic strength.'],['T','Long cruise set','3 × 10 min T, 2 min jog','Big threshold set.'],['Fartlek','Surge run','10 × 1 min quick during steady run','Economy inside endurance.']];if(ph==='Aerobic strength')return pick(early,i);if(ph==='Threshold foundation')return pick(thresh,i);if(ph==='Threshold + economy')return pick(i%3===0?economy:thresh,i);return pick(i%2?specific:thresh,i)}function longQuality(i,total){if(total<46||i<10||i%4!==0)return null;var lib=[['Progression','last 2–3 mi steady','Occasional long-run progression.'],['Steady finish','last 20–25 min steady controlled','Long-run strength.'],['M rhythm','2 × 10 min steady/M effort','Specific endurance.'],['Rolling surge','6–8 × 60 sec relaxed surge in second half','Light speed inside long run.']];return pick(lib,i)}
function makeWeek(i,start,total,restart){var p=paces(),ds=days(),ld=num(S.longDay,6),ph=phase(i,total,restart),down=i%4===0||forceDown(i),prev=P.length?P[P.length-1].days.filter(function(x){return x.type.indexOf('L')===0})[0]:null,lr=longRunMiles(total,i,restart,down,prev?prev.miles:0),rem=half(total-lr),min=total<18?3:4,vals={},normal=[],j,d;for(j=0;j<ds.length;j++)if(ds[j]!==ld)normal.push(ds[j]);for(j=0;j<normal.length;j++){vals[normal[j]]=min;rem-=min}for(j=0;normal.length&&rem>0;j=(j+1)%normal.length){vals[normal[j]]+=.5;rem-=.5}vals[ld]=lr;var out=[];for(d=0;d<7;d++){var date=ymd(add(start,(i-1)*7+d)),m=vals[d]||0,type='Off',name='Off',det='Off',why='Recovery day.';if(m>0){type='E';name='Easy';det=m+' mi easy';why='Easy '+p.E+' · HR '+p.hr;if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';name='Easy + strides';det=m+' mi easy + 4–8 × 20 sec strides';why='Easy '+p.E+' + fast relaxed strides.'}if(i>=6&&total>=28&&d===2){var q=quality(i,ph,p);type=q[0];name=q[1];det=q[2];why=q[3]+' Pace: '+(type==='T'?p.T:type==='I'?p.I:type==='M'?p.M:type==='R'?p.R:'controlled')}if(d===ld){type='L';name='Long run';det=m+' mi long';why='Long '+p.LR+' · '+Math.round(m/total*100)+'% of week · controlled';var l=longQuality(i,total);if(l){type='L/'+l[0];name='Long run + '+l[0];det=m+' mi long incl. '+l[1];why=l[2]+' Pace: '+p.LR+' to '+p.M+' · '+Math.round(m/total*100)+'% of week'}}}var r={date:date,day:D[d],miles:half(m),type:type,name:name,det:det,why:why,phase:ph,pace:p,weekMiles:total};if(S.adapt&&S.adapt[date]){for(var k in S.adapt[date])r[k]=S.adapt[date][k]}out.push(r)}var sum=0;for(j=0;j<out.length;j++)sum+=out[j].miles;return{i:i,miles:half(sum),phase:ph,days:out,down:down}}
function curWeek(){build();var t=ymd(now),i,j;for(i=0;i<P.length;i++)for(j=0;j<P[i].days.length;j++)if(P[i].days[j].date===t)return P[i];S.start=ymd(new Date());save();build();return P[0]}function todayRun(){var w=curWeek(),t=ymd(now),i;for(i=0;i<w.days.length;i++)if(w.days[i].date===t)return w.days[i];return w.days[0]}function runByDate(date){build();for(var i=0;i<P.length;i++)for(var j=0;j<P[i].days.length;j++)if(P[i].days[j].date===date)return P[i].days[j];return todayRun()}function target(r){if(r.type==='Off')return'No run';if(r.type.indexOf('L')===0)return'Long: '+r.pace.LR;if(r.type==='T')return'Threshold: '+r.pace.T;if(r.type==='I')return'Intervals: '+r.pace.I;if(r.type==='M')return'Steady/M: '+r.pace.M;if(r.type==='R')return'Reps: '+r.pace.R;if(r.type==='Fartlek'||r.type==='Hills')return'Controlled by effort';return'Easy: '+r.pace.E}function col(r){if(r.type.indexOf('L')===0)return'blue';if(['T','I','M','Fartlek','Hills','R'].indexOf(r.type)>=0)return'yellow';if(r.type==='Off')return'';return'green'}
function adaptFromLog(log,planned){var tm=ymd(add(dt(log.date),1)),msg='';if(!S.adapt)S.adapt={};if(log.pain==='bad'){S.adapt[tm]={miles:0,type:'Off',name:'Off / pain check',det:'Off or walk only',why:'Adapted: bad pain logged. No quality.'};msg='Bad pain: tomorrow off / pain check.'}else if(log.pain==='moderate'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.5)),type:'E',name:'Recovery',det:'short easy recovery',why:'Adapted: moderate pain. Quality removed.'};msg='Moderate pain: tomorrow recovery only.'}else if(log.sleep==='bad'||log.effort==='bad'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.65)),type:'E',name:'Recovery',det:'short easy recovery',why:'Adapted: bad sleep/effort. Keep it easy.'};msg='Bad sleep/effort: tomorrow downgraded.'}else if(log.skipped){var miss=planned.miles,share=planned.weekMiles?miss/planned.weekMiles:0;if(!importantMiss(log,planned)){msg='Missed small easy run under 10% of week. Keep plan the same.'}else if(planned.type.indexOf('L')===0){msg='Missed long run. Do not jump next long run.';S.recentLong=Math.min(num(S.recentLong,0)||planned.miles, num(log.miles,0))}else if(['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.7)),type:'E',name:'Easy reset',det:'easy run only',why:'Adapted: missed workout. Do not stack quality.'};msg='Missed workout: do not stack. Tomorrow easy.'}else if(share>.15){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.75)),type:'E',name:'Easy adjustment',det:'easy only',why:'Adapted: larger missed run.'};msg='Larger missed run: small adjustment.'}}else{msg='Logged. Plan stays steady.'}S.notes.unshift({date:log.date,msg:msg});S.notes=S.notes.slice(0,6)}
function weekStatus(w){var planned=w.miles,logged=loggedMilesThisWeek(),pct=clamp((logged/planned)*100,0,120),remain=Math.max(0,half(planned-logged)),long=w.days.filter(function(x){return x.type.indexOf('L')===0})[0],q=w.days.filter(function(x){return ['T','I','M','Fartlek','Hills','R'].indexOf(x.type)>=0})[0];return{planned:planned,logged:logged,pct:pct,remain:remain,long:long,q:q}}
function render(){build();['today','week','setup','plan','log'].forEach(function(x){document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});tick();renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}function renderToday(){var r=todayRun(),w=curWeek(),p=paces(),st=weekStatus(w),note=S.notes&&S.notes[0]?S.notes[0].msg:'No adjustment yet.';today.innerHTML='<div class="card hero"><span class="chip">Today · '+fmt(r.date)+'</span><div class="title">'+r.name+'</div><div class="miles">'+r.miles+' <span style="font-size:.42em">mi</span></div><div class="work">'+r.det+'</div></div><div class="card"><h2>Do this</h2><div class="pace">'+target(r)+'</div><p>'+r.why+'</p><span class="pill '+col(r)+'">'+r.type+'</span></div><div class="card"><h2>Week status</h2><div class="row" style="justify-content:space-between"><b>'+st.logged+' done / '+st.planned+' planned</b><b>'+st.remain+' left</b></div><div class="meter"><div class="fill" style="width:'+st.pct+'%"></div></div><p>Long run: '+(st.long?st.long.miles+' mi '+st.long.day+' ('+Math.round(st.long.miles/st.planned*100)+'%)':'none')+' · Next quality: '+(st.q?st.q.day+' '+st.q.name:'none yet')+'</p></div><div class="card"><h2>Training status</h2><p>'+w.phase+(w.down?' · down/adapted week':' · build week')+'</p><p><b>Latest adjustment:</b> '+note+'</p></div><div class="grid3"><div class="stat"><b>'+p.E+'</b><span>easy</span></div><div class="stat"><b>'+p.T+'</b><span>threshold</span></div><div class="stat"><b>'+p.I+'</b><span>interval</span></div></div>'}function dayHTML(r){var done=S.logs.find(function(l){return l.date===r.date});return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="date">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill '+col(r)+'">'+r.type+'</span><div class="details">'+r.det+'</div><div class="target">'+(done?'Logged '+done.miles+' mi · ':'')+target(r)+'</div></div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=curWeek(),s='<div class="card"><h2>'+w.miles+' mi week</h2><p>'+w.phase+(w.down?' · down/adapted':'')+'</p>';for(var i=0;i<w.days.length;i++)s+=dayHTML(w.days[i]);week.innerHTML=s+'</div>'}function renderPlan(){var s='';for(var i=0;i<P.length;i++){s+='<div class="card"><h2>Week '+P[i].i+': '+P[i].miles+' mi</h2><p>'+P[i].phase+(P[i].down?' · down/adapted':'')+'</p>';for(var j=0;j<P[i].days.length;j++){if(P[i].days[j].type!=='Off')s+='<p><b>'+P[i].days[j].day+'</b> · '+P[i].days[j].name+' · '+P[i].days[j].det+'</p>'}s+='</div>'}plan.innerHTML=s}
function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Recent comfortable long run, 0 ok</label><input id="recentLong" type="number" step=".5" value="'+S.recentLong+'"></div><div class="field"><label>Run days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div><div class="field"><label>Long run day</label><select id="longDay"><option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option><option value="0">Sun</option></select></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p><button class="primary" onclick="saveSetup()">Save setup</button></div><div class="card"><h2>Paces</h2><div class="grid"><button class="choice '+(S.fitness==='effort'?'active':'')+'" onclick="S.fitness=\'effort\';save();render()"><b>Effort / HR</b><span>Use this if not race fit</span></button><button class="choice '+(S.fitness==='easy'?'active':'')+'" onclick="S.fitness=\'easy\';save();render()"><b>Easy pace</b><span>Enter current easy pace</span></button><button class="choice '+(S.fitness==='test'?'active':'')+'" onclick="S.fitness=\'test\';save();render()"><b>Current test</b><span>Recent time trial only</span></button><button class="choice"><b>Old PRs ignored</b><span>15:18 / 4:12 are history only</span></button></div><div class="grid" style="margin-top:12px"><div class="field"><label>Easy pace</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div><div class="field"><label>Test distance</label><select id="testDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field"><label>Test time</label><input id="testTime" value="'+S.testTime+'" placeholder="20:30"></div></div><button class="primary" onclick="saveSetup()" style="margin-top:12px">Save paces</button></div>';document.getElementById('days').value=S.days;document.getElementById('longDay').value=S.longDay;document.getElementById('testDist').value=S.testDist}function saveSetup(){S.current=num(cur.value,0);S.cap=num(cap.value,60);S.recentLong=num(document.getElementById('recentLong').value,0);S.days=num(document.getElementById('days').value,5);S.longDay=num(document.getElementById('longDay').value,6);S.easy=easy.value;S.testDist=testDist.value;S.testTime=testTime.value;S.start=ymd(new Date());save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}
function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.det+'</p><div class="field"><label>Miles completed</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><p>Feel</p><div class="seg"><button onclick="pickLog(\'effort\',\'easy\')">Easy</button><button onclick="pickLog(\'effort\',\'normal\')">Normal</button><button onclick="pickLog(\'effort\',\'hard\')">Hard</button><button onclick="pickLog(\'effort\',\'bad\')">Bad</button></div><p>Pain</p><div class="seg"><button onclick="pickLog(\'pain\',\'none\')">None</button><button onclick="pickLog(\'pain\',\'mild\')">Mild</button><button onclick="pickLog(\'pain\',\'moderate\')">Mod</button><button onclick="pickLog(\'pain\',\'bad\')">Bad</button></div><p>Sleep</p><div class="seg"><button onclick="pickLog(\'sleep\',\'good\')">Good</button><button onclick="pickLog(\'sleep\',\'okay\')">Ok</button><button onclick="pickLog(\'sleep\',\'bad\')">Bad</button><button onclick="skipRun()">Skipped</button></div><button class="primary" onclick="saveLog(false)">Save + adapt</button></div><div class="card"><h2>Recent</h2>'+recent()+'</div>';refresh()}function pickLog(k,v){draft[k]=v;refresh()}function refresh(){var b=document.querySelectorAll('.seg button'),i,t;for(i=0;i<b.length;i++){t=b[i].textContent.toLowerCase();b[i].className='';if(t.indexOf(draft.effort)===0||t.indexOf(draft.pain)===0||t.indexOf(draft.sleep)===0)b[i].className='active'}}function saveLog(skipped){var planned=todayRun(),m=skipped?0:num(lm.value,0),log={date:ymd(now),planned:planned.det,plannedMiles:planned.miles,weekMiles:planned.weekMiles,type:planned.type,miles:m,effort:skipped?'bad':draft.effort,pain:draft.pain,sleep:draft.sleep,skipped:skipped};S.logs=S.logs.filter(function(l){return l.date!==log.date});S.logs.push(log);adaptFromLog(log,planned);save();tab('today')}function skipRun(){saveLog(true)}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';var s='',i;for(i=S.logs.length-1;i>=0&&i>S.logs.length-7;i--)s+='<p><b>'+S.logs[i].date+'</b> · '+S.logs[i].miles+' mi · '+(S.logs[i].skipped?'skipped':S.logs[i].effort)+' · pain '+S.logs[i].pain+'</p>';return s}try{if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister()})}catch(e){}setInterval(tick,30000);render();</script></body></html>
