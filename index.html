<style>

*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:radial-gradient(circle at top,#202026 0,#09090b 44%,#070708 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,Arial,sans-serif;font-size:16px;line-height:1.35;-webkit-font-smoothing:antialiased}.app{max-width:960px;margin:0 auto;padding:16px 14px 110px}header{position:sticky;top:0;z-index:10;margin:0 -14px 14px;padding:12px 14px 10px;background:rgba(7,7,8,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:960px;margin:0 auto 10px}.logo{display:flex;align-items:center;gap:10px}.mark{width:36px;height:36px;border-radius:13px;background:#fff;color:#000;display:grid;place-items:center;font-weight:1000}.brand{font-size:22px;font-weight:950;letter-spacing:-.04em}.sub{font-size:12px;color:var(--muted);font-weight:700}.tabs{display:flex;gap:8px;overflow:auto;scrollbar-width:none;max-width:960px;margin:0 auto}.tabs::-webkit-scrollbar{display:none}button{appearance:none;border:0;background:var(--card2);color:var(--ink);border-radius:999px;min-height:46px;padding:11px 15px;font-weight:850;font-size:14px;cursor:pointer}button:active{transform:scale(.98)}button.primary{background:#fff;color:#050505}button.tab{background:transparent;color:var(--muted);border:1px solid transparent;white-space:nowrap}button.tab.active{background:#fff;color:#000}button.ghost{background:transparent;border:1px solid var(--line)}button.danger{background:rgba(255,93,93,.15);color:#ffb5b5}button.small{min-height:36px;padding:8px 12px;font-size:13px}.view{animation:fade .16s ease}@keyframes fade{from{opacity:.5;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:18px;margin:12px 0;box-shadow:var(--shadow)}.hero{padding:22px;background:linear-gradient(135deg,#f7f7f7,#bfc6d6);color:#050505;border:0}.hero p,.hero .muted{color:#303036}.split{display:grid;grid-template-columns:1.15fr .85fr;gap:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}h1,h2,h3{margin:0 0 10px;line-height:1.05;letter-spacing:-.045em}h1{font-size:34px}h2{font-size:24px}h3{font-size:18px}p{margin:7px 0;color:var(--muted)}.muted{color:var(--muted)}.fine{font-size:12px;color:var(--muted);font-weight:650}.big{font-size:42px;font-weight:1000;letter-spacing:-.06em}.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:900;color:#e7e7e9}.pill.green{background:rgba(39,196,107,.16);color:#a9f2c7}.pill.yellow{background:rgba(246,201,68,.16);color:#ffe396}.pill.red{background:rgba(255,93,93,.16);color:#ffb6b6}.pill.blue{background:rgba(122,167,255,.16);color:#c8d9ff}.pill.purple{background:rgba(183,148,255,.16);color:#dccdff}.field label{display:block;color:var(--muted);font-size:12px;font-weight:850;margin:0 0 6px}input,select,textarea{width:100%;min-height:50px;border:1px solid var(--line);border-radius:16px;background:#0e0e11;color:var(--ink);padding:13px 14px;font:inherit;outline:none}input:focus,select:focus,textarea:focus{border-color:#fff}textarea{min-height:88px;resize:vertical}.quickpick{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.choice{border:1px solid var(--line);background:#111114;border-radius:18px;padding:13px;cursor:pointer}.choice.active{border-color:#fff;background:#f5f5f5;color:#050505}.choice b{display:block}.choice span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.choice.active span{color:#444}.day{display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;padding:14px 0;border-top:1px solid rgba(255,255,255,.08)}.day:first-child{border-top:0}.dow{font-size:18px;font-weight:1000}.date{font-size:11px;color:var(--muted);font-weight:800}.details{font-size:15px;font-weight:850}.purpose{font-size:12px;color:var(--muted);margin-top:3px}.mi{font-size:21px;font-weight:1000;text-align:right}.workout{font-size:13px;color:#e7e7e9;margin-top:5px}.todayMain{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}.typeBadge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:1000;background:#fff;color:#000}.off{background:#333;color:#ddd}.easy{background:rgba(39,196,107,.22);color:#bff6d4}.long{background:rgba(122,167,255,.22);color:#d5e2ff}.quality{background:rgba(246,201,68,.22);color:#ffe9a8}.manual{background:rgba(183,148,255,.22);color:#e4d8ff}.adapt{background:rgba(255,93,93,.22);color:#ffd0d0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#111114;border:1px solid var(--line);border-radius:18px;padding:13px}.stat b{display:block;font-size:23px;letter-spacing:-.04em}.stat span{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:900}.banner{border-radius:18px;padding:13px;margin:12px 0;border:1px solid rgba(255,255,255,.08);background:#111114}.banner.good{background:rgba(39,196,107,.12);color:#d7ffe5}.banner.warn{background:rgba(246,201,68,.12);color:#fff0b5}.banner.bad{background:rgba(255,93,93,.12);color:#ffd1d1}.hidden{display:none!important}.bottom{position:fixed;bottom:0;left:0;right:0;z-index:12;background:rgba(7,7,8,.84);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.08);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottomInner{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}dialog{border:0;padding:0;border-radius:26px;background:#111114;color:var(--ink);width:min(560px,calc(100% - 24px));box-shadow:0 24px 100px #000}dialog::backdrop{background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}.modal{padding:18px}.days{display:flex;gap:7px;flex-wrap:wrap}.daypick{min-width:48px;border:1px solid var(--line);background:#111114}.daypick.active{background:#fff;color:#000}.sectionTitle{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px}.weekCard{background:#111114;border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0}.miniDay{display:grid;grid-template-columns:46px 1fr auto;gap:8px;padding:9px 0;border-top:1px solid rgba(255,255,255,.06)}.miniDay:first-of-type{border-top:0}.miniDay b{font-size:13px}.miniDay span{color:var(--muted);font-size:12px}.progress{height:8px;background:#27272d;border-radius:999px;overflow:hidden}.bar{height:100%;background:#fff;border-radius:999px}.desktopOnly{display:block}.mobileOnly{display:none}@media(max-width:760px){.app{padding:12px 12px 108px}.split,.grid,.grid3,.stats{grid-template-columns:1fr}.quickpick{grid-template-columns:1fr}.card{padding:16px;border-radius:22px}.hero{padding:19px}.brand{font-size:21px}h1{font-size:30px}.big{font-size:38px}.day{grid-template-columns:46px 1fr;align-items:start}.day .mi{grid-column:2;text-align:left}.todayMain{grid-template-columns:1fr}.desktopOnly{display:none}.mobileOnly{display:block}.bottomInner{grid-template-columns:1fr 1fr}.tabs button{padding:10px 13px}.miniDay{grid-template-columns:42px 1fr}.miniDay .right{grid-column:2}}
@media(display-mode:standalone){body{padding-top:env(safe-area-inset-top)}}
</style>
</head>
<body>
<div class="app">
<header><div class="top"><div class="logo"><div class="mark">↗</div><div><div class="brand">Run Coach</div><div class="sub">modern adaptive training</div></div></div><button id="installBtn" class="small hidden">Install</button></div><nav class="tabs"><button class="tab active" data-tab="today">Today</button><button class="tab" data-tab="week">Week</button><button class="tab" data-tab="setup">Setup</button><button class="tab" data-tab="plan">Plan</button><button class="tab" data-tab="log">Log</button></nav></header>
<section id="today" class="view"></section><section id="week" class="view hidden"></section><section id="setup" class="view hidden"></section><section id="plan" class="view hidden"></section><section id="log" class="view hidden"></section>
</div>
<div class="bottom"><div class="bottomInner"><button id="logBtn" class="primary">Log today</button><button id="setupBtn">Setup</button></div></div>
<dialog id="editDialog"><div class="modal"><h2>Edit run</h2><input id="editKey" type="hidden"><div class="grid"><div class="field"><label>Miles</label><input id="editMiles" type="number" min="0" step="0.5"></div><div class="field"><label>Type</label><select id="editType"><option>E</option><option>Strides</option><option>L</option><option>T</option><option>Fartlek</option><option>Hills</option><option>I</option><option>M</option><option>Off</option></select></div></div><div class="field"><label>Workout</label><input id="editWorkout"></div><div class="field"><label>Note</label><textarea id="editPurpose"></textarea></div><div class="row"><button class="primary" id="saveEdit">Save</button><button class="danger" id="clearEdit">Clear</button><button class="ghost" id="closeEdit">Cancel</button></div></div></dialog>
<script>
const STORE='runCoachModern.v3';
const today=new Date();
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const def={tab:'today',start:ymd(today),mode:'rolling',raceDate:'',focus:'rebuild',current:0,cap:60,recentLong:0,days:5,noRun:[0],fitness:'effort',easyPace:'',timeTrialDist:'5K',timeTrialTime:'',goalTime:'',oldPR:'15:18 5K / 4:12 mile — history only',logs:[],manual:{},adapt:{},ready:false};
let state=load(), plan=[], installPrompt=null;
function load(){try{return {...def,...JSON.parse(localStorage.getItem(STORE)||'{}')}}catch(e){return {...def}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function ymd(d){let x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}
function date(s){let d=new Date(s+'T12:00:00');return isNaN(d)?new Date():d}
function add(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}
function mon(d){let x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}
const n=(v,f=0)=>{let x=parseFloat(v);return isNaN(x)?f:x}, clamp=(x,a,b)=>Math.max(a,Math.min(b,x)), half=x=>Math.round(x*2)/2, mile=x=>Math.round(x);
function fmt(d){let x=date(d);return x.toLocaleDateString([], {month:'short',day:'numeric'})}
function paceToSec(p){if(!p)return null;let m=String(p).match(/(\d+):([0-5]?\d)/);return m?+m[1]*60+ +m[2]:null}
function secToPace(s){if(!s)return 'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}
function timeToSec(t){if(!t)return null;let a=String(t).trim().split(':').map(Number);if(a.some(isNaN))return null;return a.length===3?a[0]*3600+a[1]*60+a[2]:a[0]*60+a[1]}
function distMiles(d){return {mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219}[d]||3.107}
function estimatePaces(){let easy=paceToSec(state.easyPace), race=timeToSec(state.timeTrialTime), dist=distMiles(state.timeTrialDist);let src='Effort/HR'; if(state.fitness==='easy'&&easy){src='Easy pace';return {src,E:secToPace(easy),LR:secToPace(easy+15),Steady:secToPace(easy-35),T:secToPace(easy-75),I:secToPace(easy-105),R:'fast relaxed',hr:'E 65–78%, T 85–90%, I 95%+'}}
if(state.fitness==='race'&&race){src='Current time trial';let fiveK=race*Math.pow(3.107/dist,1.06);let p5=fiveK/3.107;return {src,E:secToPace(p5+105),LR:secToPace(p5+120),Steady:secToPace(p5+60),T:secToPace(p5+28),I:secToPace(p5+5),R:'fast relaxed',hr:'E 65–78%, T 85–90%, I 95%+'}}
return {src,E:'easy / conversational',LR:'easy + relaxed',Steady:'steady but controlled',T:'comfortably hard',I:'hard controlled',R:'fast relaxed',hr:'Easy 65–78% HRmax. Threshold 85–90%. Strides full recovery.'}}
function build(){let start=mon(date(state.start||ymd(today)));let weeks=state.mode==='race'&&state.raceDate?clamp(Math.ceil((date(state.raceDate)-start)/604800000),8,32):16;let cap=n(state.cap,60);let cur=n(state.current,0);let restart=cur===0;let base=restart?Math.min(18,Math.max(12,Math.round(cap*.25))):cur;let schedule=[];for(let i=1;i<=weeks;i++){let down=i%4===0;let taper=state.mode==='race'&&i>weeks-3;let target;if(taper){let peak=Math.max(...schedule.map(w=>w.miles),base);target=i===weeks?Math.round(peak*.45):Math.round(peak*(i===weeks-1?.62:.78))}else if(down){target=Math.round(schedule[i-2].miles*.78)}else{let goal=cap;let pct=restart?[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1][i-1]:null;if(pct)target=Math.round(goal*pct);else{let prev=schedule.length?schedule[schedule.length-1].miles:base;let step=restart?Math.max(4,Math.round(goal*.09)):Math.max(3,Math.round(prev*.08));target=Math.min(goal,prev+step)}}target=clamp(target, restart?12:Math.max(10,cur*.75), cap);schedule.push(makeWeek(i,start,target,weeks,down,taper,restart));}plan=schedule;return schedule}
function phase(i,miles,weeks,taper,restart){if(taper)return 'Taper';if(restart&&i<=3)return 'Restart foundation';if(i<=5)return 'Foundation + strides';if(i<=8)return 'Aerobic strength';if(miles>=38&&i>=9)return state.focus==='marathon'?'Specific endurance':'Threshold + economy';return 'Threshold foundation'}
function runDays(){let no=new Set((state.noRun||[0]).map(Number));let days=[1,2,3,4,5,6,0].filter(d=>!no.has(d));let count=clamp(n(state.days,5),3,6);return days.slice(0,count).sort((a,b)=>a-b)}
function chooseLong(days){if(days.includes(6))return 6;if(days.includes(0))return 0;return days[days.length-1]}
function makeWeek(i,start,total,weeks,down,taper,restart){let p=estimatePaces(), days=runDays(), longD=chooseLong(days), ph=phase(i,total,weeks,taper,restart);let qualityAllowed=!taper&&i>=6&&total>=28;let hardD=days.includes(2)?2:days[0];let secondD=days.includes(5)&&longD!==5?5:null;let longBase=state.recentLongRun>0?n(state.recentLongRun):0;let longMax=restart?Math.min(total*.25,4+i*.8+(longBase?longBase*.15:0)):Math.min(total*.28,Math.max(longBase+Math.ceil(i*.8),7));let longRun=half(clamp(longMax, total>=20?5:4, Math.min(16,total*.3)));if(taper)longRun=half(total*(i===weeks?.22:.26));let remaining=total-longRun;let normal=days.filter(d=>d!==longD);let minRun=total<18?3:4;let vals={};normal.forEach(d=>vals[d]=minRun);remaining-=minRun*normal.length;if(remaining<0){normal.forEach(d=>vals[d]=half(total*.72/normal.length));remaining=0}normal.forEach((d,idx)=>{let add=idx%2===0?Math.ceil(remaining/normal.length):Math.floor(remaining/normal.length);vals[d]=half(vals[d]+add)});vals[longD]=longRun;let sum=Object.values(vals).reduce((a,b)=>a+b,0);let diff=half(total-sum);if(Math.abs(diff)>=.5)vals[longD]=half(vals[longD]+diff);let weekStart=add(start,(i-1)*7), out=[];for(let d=0;d<7;d++){let dt=ymd(add(weekStart,d)), miles=vals[d]||0, type='Off', label='Off', details='No run', purpose='Protect recovery and consistency.';if(miles>0){type='E';label='Easy';details=`${miles} mi easy`;purpose=`Aerobic volume. Pace: ${p.E}. HR: ${p.hr.split('.')[0]}.`;if(i>=2&&['Restart foundation','Foundation + strides','Aerobic strength','Threshold foundation'].includes(ph)&&d!==longD&&(d===1||d===4)){type='Strides';label='Easy + strides';details=`${miles} mi easy + 4–8 × 20 sec strides`;purpose='Keep speed and mechanics without making it a workout. Full walking/jog recovery.'}if(qualityAllowed&&d===hardD){let w=workoutFor(i,total,ph,p);type=w.type;label=w.label;details=w.details;purpose=w.purpose}if(d===longD){type='L';label='Long run';details=`${miles} mi long run`;purpose=`Long aerobic support. Pace: ${p.LR}. No racing the long run.`;let lrw=longWorkout(i,total,ph,p,taper);if(lrw){type='L/'+lrw.type;details=`${miles} mi long run incl. ${lrw.details}`;purpose=lrw.purpose}}if(taper&&d===hardD&&miles>0){type='T';label='Rhythm';details=`${miles} mi incl. light T rhythm, low volume`;purpose='Keep rhythm while reducing fatigue.'}}
let day={date:dt,day:DOW[d],miles:half(miles),type,label,details,purpose,phase:ph,pace:p};let man=state.manual[dt], ad=state.adapt[dt];if(ad)day={...day,...ad,adapted:true};if(man)day={...day,...man,manual:true};out.push(day)}return {i,miles:out.reduce((a,d)=>a+d.miles,0),phase:ph,down,taper,days:out,why:whyText(i,total,ph,down,taper,restart)}}
function workoutFor(i,m,ph,p){if(ph==='Aerobic strength')return {type:'Fartlek',label:'Controlled fartlek',details:`easy run incl. 8–10 × 1 min on / 1 min easy`,purpose:'College-style aerobic power without forcing VO2 too early.'};if(ph==='Threshold foundation')return {type:'T',label:'Cruise intervals',details:`easy run incl. 4–6 × 5 min T w/ 90 sec jog`,purpose:`Threshold first. T pace: ${p.T}. Controlled, not a race.`};if(ph==='Threshold + economy')return i%2?{type:'T',label:'Threshold reps',details:`easy run incl. 5–6 × 1K T or 3–4 × 1 mi T`,purpose:`Real threshold work. T pace: ${p.T}.`}:{type:'I',label:'Interval economy',details:`easy run incl. 5 × 3 min hard controlled w/ equal jog`,purpose:`I work only after base exists. I effort: ${p.I}.`};if(ph==='Specific endurance')return {type:'T',label:'Medium-long threshold',details:`medium run incl. 2 × 12–15 min T`,purpose:`Marathon/HM strength. T pace: ${p.T}.`};return {type:'Strides',label:'Easy + strides',details:'easy + 6 × 20 sec strides',purpose:'Speed maintenance only.'}}
function longWorkout(i,m,ph,p,taper){if(taper||m<42||i<9)return null;if(state.focus==='marathon')return i%2?{type:'M',details:`last 20–35 min steady / M effort`,purpose:`Long-run quality appears only after mileage supports it. M/steady: ${p.Steady}.`}:{type:'T',details:`3 × 8 min steady-T w/ easy running`,purpose:'Specific endurance without overcooking the week.'};if(state.focus==='half'||state.focus==='10k')return {type:'Progression',details:'last 2–4 mi steady progression',purpose:`Finish strong, controlled. Steady: ${p.Steady}.`};return {type:'Steady',details:'last 15–25 min steady if feeling good',purpose:'Optional aerobic strength, not forced.'}}
function whyText(i,total,ph,down,taper,restart){if(taper)return 'Taper week: volume drops but rhythm stays.';if(down)return 'Absorption week: reduced load so the next block can actually work.';if(restart&&i<=3)return 'Restart from current 0: useful runs, no junk 1-milers, no formal workouts.';return `${ph}: volume builds toward your cap while workout types are gated by phase and mileage.`}
function todayRun(){build();let t=ymd(today);return plan.flatMap(w=>w.days).find(d=>d.date===t)||plan[0].days.find(d=>d.miles>0)||plan[0].days[0]}
function weekNow(){build();let t=ymd(today);return plan.find(w=>w.days.some(d=>d.date===t))||plan[0]}
function cls(d){if(d.manual)return'manual';if(d.adapted)return'adapt';if(d.type==='Off')return'off';if(String(d.type).includes('L'))return'long';if(['T','I','M','Fartlek','Hills'].some(x=>String(d.type).includes(x)))return'quality';return'easy'}
function render(){build();document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(state.tab).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));renderToday();renderWeek();renderSetup();renderPlan();renderLog()}
function setTab(t){state.tab=t;save();render();scrollTo({top:0,behavior:'smooth'})}
function renderToday(){let d=todayRun(), w=weekNow(), p=estimatePaces();document.getElementById('today').innerHTML=`<div class="card hero"><div class="todayMain"><div><div class="pill">${fmt(d.date)} • ${d.phase}</div><h1>${d.label}</h1><div class="big">${d.miles} mi</div><p>${d.details}</p></div><span class="typeBadge ${cls(d)}">${d.type}</span></div></div><div class="stats"><div class="stat"><b>${w.miles}</b><span>this week</span></div><div class="stat"><b>${state.cap||60}</b><span>max cap</span></div><div class="stat"><b>${p.E}</b><span>easy pace</span></div><div class="stat"><b>${w.phase}</b><span>phase</span></div></div><div class="card"><h2>Coach note</h2><p>${d.purpose}</p><div class="banner good"><b>Today rule:</b> easy means easy. Old PRs are not current pace. If HR/RPE is high, slow down.</div><div class="row"><button class="primary" onclick="quickComplete('done')">Done</button><button onclick="quickComplete('tired')">Too hard</button><button onclick="quickComplete('pain')" class="danger">Pain</button><button onclick="openEdit('${d.date}')" class="ghost">Edit</button></div></div>`}
function renderWeek(){let w=weekNow();document.getElementById('week').innerHTML=`<div class="sectionTitle"><div><h2>This week</h2><p>${w.why}</p></div><span class="pill ${w.down?'yellow':'green'}">${w.phase}</span></div><div class="card">${w.days.map(dayHtml).join('')}</div>`}
function renderPlan(){document.getElementById('plan').innerHTML=`<div class="sectionTitle"><div><h2>Full plan</h2><p>Every fourth week backs off. Workouts unlock only when the phase and mileage support them.</p></div></div>${plan.map(w=>`<div class="weekCard"><div class="between"><div><b>Week ${w.i}: ${w.miles} mi</b><p>${w.phase}</p></div><span class="pill ${w.down?'yellow':w.taper?'purple':'green'}">${w.down?'Down':w.taper?'Taper':'Build'}</span></div><div class="progress"><div class="bar" style="width:${clamp(w.miles/(state.cap||60)*100,5,100)}%"></div></div>${w.days.map(d=>`<div class="miniDay"><b>${d.day}</b><div><b>${d.label}</b><span> — ${d.details}</span></div><div class="right"><b>${d.miles} mi</b></div></div>`).join('')}</div>`).join('')}`}
function renderSetup(){let days=[0,1,2,3,4,5,6];document.getElementById('setup').innerHTML=`<div class="card hero"><h1>Simple setup</h1><p>Set the few things that matter. The coach decides the rest.</p></div><div class="card"><h2>1. Goal</h2><div class="quickpick"><div class="choice ${state.mode==='rolling'?'active':''}" onclick="state.mode='rolling';save();render()"><b>No race</b><span>Rolling rebuild / fitness cycle</span></div><div class="choice ${state.mode==='race'?'active':''}" onclick="state.mode='race';save();render()"><b>Race</b><span>Add taper and race-specific work</span></div></div><div class="grid" style="margin-top:12px"><div class="field"><label>Focus</label><select id="focus"><option value="rebuild">Rebuild fitness</option><option value="5k">5K</option><option value="10k">10K</option><option value="half">Half marathon</option><option value="marathon">Marathon</option></select></div><div class="field ${state.mode==='race'?'':'hidden'}"><label>Race date</label><input id="raceDate" type="date" value="${state.raceDate}"></div></div></div><div class="card"><h2>2. Training now</h2><div class="grid"><div class="field"><label>Current weekly mileage — 0 is okay</label><input id="current" type="number" min="0" step="1" value="${state.current}"></div><div class="field"><label>Max weekly mileage cap</label><input id="cap" type="number" min="20" step="1" value="${state.cap}"></div><div class="field"><label>Recent comfortable long run — 0 is okay</label><input id="recentLong" type="number" min="0" step="0.5" value="${state.recentLong}"></div><div class="field"><label>Run days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div></div><p class="fine">Sunday is off by default. Peachtree does not count unless you put it in recent long run.</p><div class="days">${days.map(d=>`<button class="daypick ${(state.noRun||[]).includes(d)?'active':''}" onclick="toggleNoRun(${d})">${DOW[d]}</button>`).join('')}</div></div><div class="card"><h2>3. Pace source</h2><div class="quickpick"><div class="choice ${state.fitness==='effort'?'active':''}" onclick="state.fitness='effort';save();render()"><b>Effort / HR</b><span>Best if not race-fit right now</span></div><div class="choice ${state.fitness==='easy'?'active':''}" onclick="state.fitness='easy';save();render()"><b>Easy pace</b><span>Use current easy pace</span></div><div class="choice ${state.fitness==='race'?'active':''}" onclick="state.fitness='race';save();render()"><b>Time trial</b><span>Use current result only</span></div><div class="choice"><b>Old PRs ignored</b><span>${state.oldPR}</span></div></div><div class="grid" style="margin-top:12px"><div class="field ${state.fitness==='easy'?'':'hidden'}"><label>Current easy pace</label><input id="easyPace" placeholder="8:00" value="${state.easyPace}"></div><div class="field ${state.fitness==='race'?'':'hidden'}"><label>Current time trial distance</label><select id="timeTrialDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field ${state.fitness==='race'?'':'hidden'}"><label>Current time</label><input id="timeTrialTime" placeholder="20:30" value="${state.timeTrialTime}"></div></div><div class="row"><button class="primary" onclick="saveSetup()">Build plan</button><button class="danger" onclick="resetAll()">Reset everything</button></div></div>`;setVal('focus',state.focus);setVal('days',state.days);setVal('timeTrialDist',state.timeTrialDist)}
function renderLog(){let d=todayRun();document.getElementById('log').innerHTML=`<div class="card"><h1>Log today</h1><p>${d.label}: ${d.details}</p><div class="grid"><div class="field"><label>Miles completed</label><input id="logMiles" type="number" step="0.5" value="${d.miles}"></div><div class="field"><label>RPE 1–10</label><input id="logRpe" type="number" min="1" max="10" value="5"></div><div class="field"><label>Soreness / pain</label><select id="logPain"><option>none</option><option>mild</option><option>moderate</option><option>bad</option></select></div><div class="field"><label>Sleep</label><select id="logSleep"><option>good</option><option>okay</option><option>bad</option></select></div></div><div class="field"><label>Notes</label><textarea id="logNotes" placeholder="How did it feel?"></textarea></div><div class="row"><button class="primary" onclick="saveLog()">Save log + adapt</button><button onclick="quickComplete('skip')">Skipped</button></div></div><div class="card"><h2>Recent logs</h2>${state.logs.slice(-8).reverse().map(l=>`<p><b>${l.date}</b> — ${l.miles} mi, RPE ${l.rpe}, pain ${l.pain}</p>`).join('')||'<p>No logs yet.</p>'}</div>`}
function dayHtml(d){return `<div class="day"><div><div class="dow">${d.day}</div><div class="date">${fmt(d.date)}</div></div><div><div><b>${d.label}</b> <span class="pill ${cls(d)}">${d.type}</span></div><div class="details">${d.details}</div><div class="purpose">${d.purpose}</div><div class="row" style="margin-top:8px"><button class="small" onclick="openEdit('${d.date}')">Edit</button></div></div><div class="mi">${d.miles} mi</div></div>`}
function setVal(id,v){let el=document.getElementById(id);if(el)el.value=v}
function saveSetup(){['focus','raceDate','current','cap','recentLong','days','easyPace','timeTrialDist','timeTrialTime'].forEach(id=>{let el=document.getElementById(id);if(el)state[id==='current'?'current':id]=el.type==='number'?n(el.value,0):el.value});state.ready=true;save();setTab('today')}
function toggleNoRun(d){state.noRun=state.noRun||[];state.noRun=state.noRun.includes(d)?state.noRun.filter(x=>x!==d):[...state.noRun,d];if(state.noRun.length>4)state.noRun=state.noRun.filter(x=>x!==d);save();render()}
function openEdit(key){let d=plan.flatMap(w=>w.days).find(x=>x.date===key);if(!d)return;setVal('editKey',key);setVal('editMiles',d.miles);setVal('editType',String(d.type).split('/')[0]);setVal('editWorkout',d.details);setVal('editPurpose',d.purpose);document.getElementById('editDialog').showModal()}
function saveEdit(){let k=document.getElementById('editKey').value;state.manual[k]={miles:n(document.getElementById('editMiles').value,0),type:document.getElementById('editType').value,label:label(document.getElementById('editType').value),details:document.getElementById('editWorkout').value,purpose:document.getElementById('editPurpose').value};delete state.adapt[k];save();document.getElementById('editDialog').close();render()}
function clearEdit(){let k=document.getElementById('editKey').value;delete state.manual[k];delete state.adapt[k];save();document.getElementById('editDialog').close();render()}
function label(t){return {E:'Easy',Strides:'Easy + strides',L:'Long run',T:'Threshold',Fartlek:'Fartlek',Hills:'Hill strides',I:'Intervals',M:'Marathon pace',Off:'Off'}[t]||t}
function saveLog(){let d=todayRun(), log={date:ymd(today),planned:d.details,miles:n(document.getElementById('logMiles').value,0),rpe:n(document.getElementById('logRpe').value,5),pain:document.getElementById('logPain').value,sleep:document.getElementById('logSleep').value,notes:document.getElementById('logNotes').value};state.logs=state.logs.filter(l=>l.date!==log.date).concat(log);adaptTomorrow(log);save();setTab('today')}
function quickComplete(kind){let d=todayRun();let log={date:ymd(today),planned:d.details,miles:kind==='skip'?0:d.miles,rpe:kind==='tired'?8:5,pain:kind==='pain'?'moderate':'none',sleep:kind==='tired'?'bad':'good',notes:kind};state.logs=state.logs.filter(l=>l.date!==log.date).concat(log);adaptTomorrow(log);save();render()}
function adaptTomorrow(log){let tm=ymd(add(today,1));let bad=log.pain==='moderate'||log.pain==='bad'||log.rpe>=8||log.sleep==='bad';if(!bad){delete state.adapt[tm];return}state.adapt[tm]={miles:log.pain==='bad'?0:Math.max(3,Math.round((todayRun().miles||4)*.65)),type:log.pain==='bad'?'Off':'E',label:log.pain==='bad'?'Off':'Recovery run',details:log.pain==='bad'?'Off / assess pain':'short easy recovery only',purpose:'Adapted from today’s log. No workout until the body is back under control.'}}
function resetAll(){if(confirm('Clear saved plan, logs, and edits?')){localStorage.removeItem(STORE);state=load();render()}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));document.getElementById('setupBtn').onclick=()=>setTab('setup');document.getElementById('logBtn').onclick=()=>setTab('log');document.getElementById('saveEdit').onclick=saveEdit;document.getElementById('clearEdit').onclick=clearEdit;document.getElementById('closeEdit').onclick=()=>document.getElementById('editDialog').close();window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;let b=document.getElementById('installBtn');b.classList.remove('hidden');b.onclick=async()=>{b.classList.add('hidden');installPrompt.prompt();await installPrompt.userChoice;installPrompt=null}});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));window.openEdit=openEdit;window.quickComplete=quickComplete;window.saveLog=saveLog;window.saveSetup=saveSetup;window.toggleNoRun=toggleNoRun;window.resetAll=resetAll;render();
</script>
</body>
</html>
