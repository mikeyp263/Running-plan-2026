<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Run Coach</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#f7f6f2;
      --card:#fffefa;
      --ink:#111827;
      --muted:#646464;
      --line:#dedbd2;
      --soft:#f1efe8;
      --accent:#111827;
      --green:#e8f8ee;
      --yellow:#fff7d9;
      --red:#ffe8e8;
      --blue:#eaf1ff;
      --radius:20px;
      --shadow: 0 1px 8px rgba(17,24,39,.08);
      --tap: 48px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.35}
    .app{max-width:920px;margin:0 auto;padding:18px 16px 120px}
    header{position:sticky;top:0;background:rgba(247,246,242,.96);backdrop-filter: blur(12px);z-index:5;border-bottom:1px solid var(--line);margin:0 -16px 16px;padding:12px 16px 10px}
    .topline{display:flex;gap:10px;align-items:center;justify-content:space-between;max-width:920px;margin:0 auto 10px}
    .brand{font-weight:900;font-size:23px;letter-spacing:-.03em}
    .sub{font-size:13px;color:var(--muted);font-weight:700}
    .tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px;max-width:920px;margin:0 auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    button,.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);min-height:var(--tap);padding:11px 15px;border-radius:999px;font-weight:850;font-size:15px;cursor:pointer;box-shadow:none}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    button.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    button.ghost{background:transparent}
    button.small{min-height:36px;padding:8px 12px;font-size:13px}
    button.danger{background:var(--red);border-color:#ffd0d0;color:#7f1d1d}
    button:disabled{opacity:.5;cursor:not-allowed}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin:14px 0}
    .hero{background:linear-gradient(135deg,#fffefa,#f2efe6);}
    h1,h2,h3{margin:0 0 10px;letter-spacing:-.03em;line-height:1.1}
    h1{font-size:28px}h2{font-size:24px}h3{font-size:18px}
    p{margin:8px 0;color:var(--muted)}
    .big{font-size:28px;font-weight:950;letter-spacing:-.04em}
    .muted{color:var(--muted)}
    .note{background:var(--yellow);border:1px solid #f5cf66;border-radius:14px;padding:12px;margin:12px 0;color:#2d2612}
    .ok{background:var(--green);border:1px solid #bce7c8;border-radius:14px;padding:12px;margin:12px 0;color:#12301e}
    .warn{background:var(--red);border:1px solid #ffbcbc;border-radius:14px;padding:12px;margin:12px 0;color:#4a1212}
    .info{background:var(--blue);border:1px solid #c8dcff;border-radius:14px;padding:12px;margin:12px 0;color:#162746}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .field label{display:block;font-size:13px;font-weight:750;color:var(--muted);margin:0 0 6px}
    input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:13px 14px;font:inherit;min-height:48px;color:var(--ink)}
    textarea{min-height:90px;resize:vertical}
    input[type=checkbox]{width:auto;min-height:auto;transform:scale(1.15);margin-right:6px}
    .checks{display:flex;flex-wrap:wrap;gap:8px}
    .checkpill{display:flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 12px;font-weight:750;color:var(--ink)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
    .statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
    .stat{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted);font-weight:750}
    .day{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;border-top:1px solid var(--line);padding:13px 0}
    .day:first-of-type{border-top:none}
    .dayname{font-size:22px;font-weight:950;letter-spacing:-.03em}.daydate{font-size:12px;color:var(--muted);font-weight:700}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;background:var(--green);font-weight:900;font-size:12px;white-space:nowrap}
    .badge.off{background:#ececf0}.badge.long{background:#eef0f6}.badge.work{background:#fff1bf}.badge.easy{background:var(--green)}.badge.adapt{background:#ffe0e0;color:#7f1d1d}.badge.manual{background:#e8e1ff;color:#2d1768}
    .miles{font-size:22px;font-weight:950;text-align:right}.details{font-size:14px;color:#1f2937}.purpose{font-size:13px;color:var(--muted);font-weight:650;margin-top:2px}
    .daybuttons{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
    .phase{display:inline-block;background:#f2efe8;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;margin-left:6px}
    .weekcard{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;margin:10px 0}.weekhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.weekhead b{font-size:18px}
    .compact-day{display:grid;grid-template-columns:50px 1fr auto;gap:8px;border-top:1px solid #eee;padding:9px 0;font-size:14px}.compact-day:first-of-type{border-top:0}.compact-day .m{font-weight:900}
    .hidden{display:none!important}.fine{font-size:12px;color:var(--muted);font-weight:600}
    dialog{border:0;border-radius:22px;padding:0;max-width:560px;width:calc(100% - 28px);box-shadow:0 20px 80px rgba(0,0,0,.25);background:var(--card)}dialog::backdrop{background:rgba(0,0,0,.35)}.modal{padding:18px}
    .two-line{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;background:var(--soft);padding:6px 10px;font-weight:850;font-size:13px;color:#333}
    .footerbar{position:fixed;bottom:0;left:0;right:0;background:rgba(247,246,242,.95);border-top:1px solid var(--line);padding:10px 14px;z-index:4;backdrop-filter: blur(12px)}.footerinner{max-width:920px;margin:0 auto;display:flex;gap:10px;align-items:center;justify-content:center}.footerinner button{flex:1;max-width:260px}
    @media (max-width:760px){.app{padding:12px 12px 112px}.grid,.grid3,.statrow{grid-template-columns:1fr}.card{padding:15px;border-radius:18px}.day{grid-template-columns:56px 1fr;gap:8px}.day .right{grid-column:2}.miles{text-align:left}.daybuttons{justify-content:flex-start}.brand{font-size:21px}h1{font-size:25px}.tabs button{padding:10px 13px;font-size:14px}.compact-day{grid-template-columns:46px 1fr}.compact-day .m{grid-column:2}.footerinner{justify-content:stretch}.footerinner button{max-width:none}}
    @media (display-mode: standalone){body{padding-top: env(safe-area-inset-top)}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline"><div><div class="brand">Run Coach</div><div class="sub">simple setup → real progression → daily edits</div></div><button id="installBtn" class="small hidden">Install</button></div>
      <nav class="tabs" aria-label="Main tabs">
        <button class="tab active" data-tab="today">Today</button>
        <button class="tab" data-tab="week">Week</button>
        <button class="tab" data-tab="setup">Setup</button>
        <button class="tab" data-tab="log">Log</button>
        <button class="tab" data-tab="plan">Plan</button>
        <button class="tab" data-tab="rules">Rules</button>
      </nav>
    </header>

    <section id="today" class="view"></section>
    <section id="week" class="view hidden"></section>
    <section id="setup" class="view hidden"></section>
    <section id="log" class="view hidden"></section>
    <section id="plan" class="view hidden"></section>
    <section id="rules" class="view hidden"></section>
  </div>

  <div class="footerbar">
    <div class="footerinner">
      <button id="quickBuild" class="primary">Build / update plan</button>
      <button id="quickLog">Log today</button>
    </div>
  </div>

  <dialog id="editDialog">
    <div class="modal">
      <h2>Edit day</h2>
      <p class="fine">This override is saved. The coach will not erase it unless you reset manual edits.</p>
      <input type="hidden" id="editKey" />
      <div class="grid">
        <div class="field"><label>Miles</label><input id="editMiles" type="number" min="0" step="0.5"></div>
        <div class="field"><label>Type</label><select id="editType"><option>E</option><option>Strides</option><option>Hill</option><option>T</option><option>I</option><option>R</option><option>M</option><option>L</option><option>Off</option></select></div>
      </div>
      <div class="field"><label>Workout details</label><input id="editDetails" placeholder="ex: 6 mi easy + 6 x 20 sec strides"></div>
      <div class="field"><label>Purpose / note</label><textarea id="editPurpose" placeholder="why this day exists"></textarea></div>
      <div class="actions"><button id="saveEdit" class="primary">Save edit</button><button id="clearEdit" class="danger">Clear edit</button><button id="closeEdit">Cancel</button></div>
    </div>
  </dialog>

  <script>
  const STORE = 'runCoachFinal.v1';
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const longDayOrder = [1,2,3,4,5,6,0];
  const todayDate = new Date();
  const defaultState = {
    setupDone:false,
    activeTab:'today',
    startDate: ymd(todayDate),
    goalMode:'rolling',
    raceDate:'',
    focus:'rebuild',
    level:'former',
    currentMileage:0,
    recentLongRun:0,
    daysPerWeek:5,
    noRunDays:[0],
    maxMileageCap:'',
    longRunDay:'auto',
    paceSource:'effort',
    raceDistance:'5K',
    currentTime:'',
    goalTime:'',
    easyPace:'',
    oldPRs:'15:18 5K / 4:12 mile — history only, not current pace',
    logs:[],
    manualEdits:{},
    adaptations:{},
    generatedAt:null
  };
  let state = load();
  let plan = [];
  let deferredInstall = null;

  function load(){
    try{ return {...defaultState, ...(JSON.parse(localStorage.getItem(STORE)||'{}'))}; }
    catch(e){ return {...defaultState}; }
  }
  function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }
  function clamp(n,min,max){return Math.max(min, Math.min(max, n));}
  function roundHalf(n){ return Math.round(n*2)/2; }
  function roundMile(n){ return Math.round(n); }
  function ymd(d){ const x = new Date(d); x.setHours(12,0,0,0); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); }
  function parseDate(s){ if(!s) return null; const d = new Date(s+'T12:00:00'); return isNaN(d) ? null : d; }
  function addDays(d,n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
  function mondayOf(d){ const x = new Date(d); x.setHours(12,0,0,0); const day=x.getDay(); const diff = (day===0 ? -6 : 1-day); x.setDate(x.getDate()+diff); return x; }
  function fmtDate(s){ const d = typeof s === 'string' ? parseDate(s) : s; return d ? d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) : ''; }
  function asNum(v, fallback=0){ const n = Number(v); return Number.isFinite(n) ? n : fallback; }
  function esc(s){ return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function parseTimeToSec(t){
    if(!t) return null; let s=String(t).trim(); if(!s) return null;
    const parts=s.split(':').map(Number); if(parts.some(x=>!Number.isFinite(x))) return null;
    if(parts.length===2) return parts[0]*60+parts[1];
    if(parts.length===3) return parts[0]*3600+parts[1]*60+parts[2];
    return Number(s)*60;
  }
  function secToPace(sec){
    if(!Number.isFinite(sec) || sec<=0) return 'effort';
    const m = Math.floor(sec/60), r = Math.round(sec%60);
    return `${m}:${String(r).padStart(2,'0')}/mi`;
  }
  function parsePaceToSec(p){
    if(!p) return null; const s=String(p).replace('/mi','').trim(); const parts=s.split(':').map(Number);
    if(parts.length===2 && parts.every(Number.isFinite)) return parts[0]*60+parts[1];
    const n=Number(s); return Number.isFinite(n) ? n*60 : null;
  }
  function distMiles(label){ return {'Mile':1,'3K':1.864,'5K':3.106,'10K':6.214,'Half':13.109,'Marathon':26.219}[label] || 3.106; }
  function paceZones(){
    const raceSec = parseTimeToSec(state.currentTime);
    const goalSec = parseTimeToSec(state.goalTime);
    const easySec = parsePaceToSec(state.easyPace);
    const dist = distMiles(state.raceDistance);
    let source = 'effort-based until you have a current test or recent race';
    let zones = {E:'conversation effort', M:'steady but controlled', T:'comfortably hard, never all-out', I:'hard reps; only late plan', R:'fast relaxed strides/reps'};
    if(state.paceSource === 'easy' && easySec){
      zones.E = secToPace(easySec);
      zones.M = secToPace(easySec - 45);
      zones.T = secToPace(easySec - 75);
      zones.I = secToPace(easySec - 105);
      zones.R = 'fast relaxed, full recovery';
      source = `easy pace estimate ${state.easyPace}`;
    } else if(state.paceSource === 'race' && raceSec){
      const racePace = raceSec / dist;
      const add = state.raceDistance === '5K' ? {E:120,M:75,T:35,I:0,R:-35} : state.raceDistance==='10K' ? {E:105,M:60,T:20,I:-18,R:-45} : state.raceDistance==='Half' ? {E:75,M:35,T:-5,I:-40,R:-70} : {E:60,M:5,T:-25,I:-60,R:-90};
      zones = {E:secToPace(racePace+add.E),M:secToPace(racePace+add.M),T:secToPace(racePace+add.T),I:secToPace(racePace+add.I),R:secToPace(racePace+add.R)};
      source = `current ${state.raceDistance} fitness ${state.currentTime}`;
    } else if(state.paceSource === 'goal' && goalSec){
      const goalPace = goalSec / dist;
      const add = state.raceDistance === '5K' ? {E:120,M:75,T:35,I:0,R:-35} : state.raceDistance==='10K' ? {E:105,M:60,T:20,I:-18,R:-45} : state.raceDistance==='Half' ? {E:75,M:35,T:-5,I:-40,R:-70} : {E:60,M:5,T:-25,I:-60,R:-90};
      zones = {E:secToPace(goalPace+add.E),M:secToPace(goalPace+add.M),T:secToPace(goalPace+add.T),I:secToPace(goalPace+add.I),R:secToPace(goalPace+add.R)};
      source = `goal ${state.raceDistance} time ${state.goalTime}; use as future target, not current demand`;
    }
    return {zones, source};
  }
  function autoCap(){
    const cur = asNum(state.currentMileage,0);
    const userCap = asNum(state.maxMileageCap,0);
    if(userCap>0) return userCap;
    const byFocus = {rebuild:45, fitness:50, '5k':55, '10k':60, half:65, marathon:70}[state.focus] || 50;
    if(cur<=0) return Math.min(byFocus, state.focus==='marathon'?55:45);
    return byFocus;
  }
  function getAvailableDays(){
    const no = new Set((state.noRunDays||[]).map(Number));
    return longDayOrder.filter(d => !no.has(d));
  }
  function chooseLongRunDay(){
    if(state.longRunDay !== 'auto') return Number(state.longRunDay);
    const avail = getAvailableDays();
    if(avail.includes(6)) return 6; // Saturday when Sunday is off
    if(avail.includes(0)) return 0;
    return avail[avail.length-1] ?? 6;
  }
  function chooseRunDays(actualRuns, longDay){
    const avail = getAvailableDays();
    const pref = [longDay,2,4,1,3,5,6,0].filter((d,i,a)=>a.indexOf(d)===i && avail.includes(d));
    return pref.slice(0, actualRuns).sort((a,b)=>longDayOrder.indexOf(a)-longDayOrder.indexOf(b));
  }
  function chooseWorkoutDays(runDays, longDay, phase, actualRuns){
    const allows = ['aerobic strength','threshold','specific','taper'].includes(phase.id);
    if(!allows) return [];
    const candidates = [2,3,4,1,5].filter(d=>runDays.includes(d) && d!==longDay);
    let w1 = candidates.includes(2) ? 2 : candidates[0];
    let days = w1!=null ? [w1] : [];
    const canSecond = actualRuns>=6 && ['threshold','specific'].includes(phase.id);
    if(canSecond){
      let w2 = candidates.find(d=>d!==w1 && Math.abs(d-longDay)>1 && Math.abs(d-w1)>1);
      if(w2!=null) days.push(w2);
    }
    return days;
  }
  function startMileage(){
    const cur = asNum(state.currentMileage,0), d = asNum(state.daysPerWeek,5);
    if(cur <= 0){
      if(d>=6) return 18;
      if(d===5) return 15;
      if(d===4) return 12;
      return 10;
    }
    return Math.max(cur, Math.min(cur + 3, d*3));
  }
  function phaseFor(weekIndex, totalWeeks, targetMileage){
    const age = weekIndex+1;
    const currentZero = asNum(state.currentMileage,0)<=0;
    if(state.goalMode === 'race'){
      const weeksLeft = Math.max(0, totalWeeks - weekIndex - 1);
      const taperLen = state.focus==='marathon' ? 3 : state.focus==='half' ? 2 : 2;
      if(weeksLeft < taperLen) return {id:'taper', name:'Taper', why:'Volume drops, but rhythm stays. No new fitness is chased.'};
      if(state.focus==='marathon' && weeksLeft <= 10 && targetMileage>=35) return {id:'specific', name:'Race specific', why:'Marathon-specific work is allowed only after base and threshold are established.'};
      if(['5k','10k','half'].includes(state.focus) && weeksLeft <= 6 && targetMileage>=28) return {id:'specific', name:'Race specific', why:'Sharper work appears near the goal, not at the beginning.'};
      if(age >= (currentZero?7:5) && targetMileage>=24) return {id:'threshold', name:'Threshold', why:'Controlled T work builds aerobic power before faster race work.'};
      if(age >= (currentZero?4:3) && targetMileage>=18) return {id:'aerobic strength', name:'Aerobic strength', why:'Short hills/strides build mechanics without turning the week into a workout week.'};
      return {id:'foundation', name:'Foundation', why:'Easy volume first. No real workouts yet.'};
    }
    if(age <= (currentZero?3:2) || targetMileage<18) return {id:'foundation', name:'Foundation', why:'Easy volume first. No real workouts yet.'};
    if(age <= 6 || targetMileage<24) return {id:'aerobic strength', name:'Aerobic strength', why:'Short hills/strides build mechanics without high stress.'};
    if(age <= 10 || targetMileage<36) return {id:'threshold', name:'Threshold', why:'Controlled T work is the main quality before any sharpening.'};
    return {id:'specific', name:'Specific fitness', why:'Only now does the plan add focused workouts or long-run quality.'};
  }
  function mileageForWeek(i, prev, totalWeeks){
    const cap = autoCap();
    const down = (i+1)%4===0;
    const curZero = asNum(state.currentMileage,0)<=0;
    if(i===0) return Math.min(startMileage(), cap);
    let next;
    if(down){ next = Math.max(startMileage(), prev * (curZero && i<5 ? .82 : .78)); }
    else {
      const step = prev < 24 ? 3 : prev < 45 ? 4 : Math.max(3, Math.min(5, prev*.07));
      next = prev + step;
    }
    if(state.goalMode === 'race'){
      const left = totalWeeks - i;
      const taperLen = state.focus==='marathon' ? 3 : state.focus==='half' ? 2 : 2;
      if(left <= taperLen){
        const factor = left===taperLen ? .78 : left===1 ? .45 : .60;
        next = Math.max(startMileage()*.55, cap * factor);
      }
    }
    return roundMile(Math.min(next, cap));
  }
  function computeLongRun(target, weekIndex, phase){
    const recent = asNum(state.recentLongRun,0);
    const base = recent>0 ? recent : Math.max(4, Math.min(6, target*.32));
    const growAllowed = base + weekIndex * (recent>0 ? 1.5 : 1.25);
    const pctCap = target < 30 ? .34 : target < 50 ? .30 : .27;
    let maxByFocus = state.focus==='marathon' ? 22 : state.focus==='half' ? 16 : state.focus==='10k' ? 14 : state.focus==='5k' ? 12 : 15;
    let lr = Math.min(target*pctCap, growAllowed, maxByFocus);
    if((weekIndex+1)%4===0) lr *= .82;
    if(phase.id==='taper') lr = Math.min(lr, target*.30);
    return roundHalf(Math.max(4, lr));
  }
  function workoutFor(phase, focus, weekIndex, miles, isSecond, zones){
    const age = weekIndex+1;
    if(phase.id==='foundation'){
      if(age>=3 && miles>=4) return {type:'Strides', label:'Easy + strides', details:`${miles} mi E + 4–6 × 20 sec relaxed strides`, purpose:'Easy aerobic work with light speed, not a workout.'};
      return {type:'E', label:'Easy', details:`${miles} mi E`, purpose:'Build frequency and tissue tolerance first.'};
    }
    if(phase.id==='aerobic strength'){
      if(isSecond) return {type:'Strides', label:'Easy + strides', details:`${miles} mi E + 6 × 20 sec strides`, purpose:'Neuromuscular speed with low metabolic cost.'};
      return {type:'Hill', label:'Short hills', details:`${miles} mi total with 6–8 × 10 sec hill sprints, full walk-back recovery`, purpose:'Strength and mechanics without early VO₂ stress.'};
    }
    if(phase.id==='threshold'){
      if(isSecond) return {type:'Strides', label:'Easy + strides', details:`${miles} mi E + 6 × 20 sec strides`, purpose:'Keep rhythm without stacking hard days.'};
      const reps = miles>=8 ? '3 × 8 min T w/ 2 min jog' : '2 × 8 min T w/ 2 min jog';
      return {type:'T', label:'Cruise threshold', details:`${miles} mi total with ${reps}. T pace: ${zones.T}`, purpose:'Controlled threshold, not racing the workout.'};
    }
    if(phase.id==='specific'){
      if(focus==='marathon'){
        if(isSecond) return {type:'T', label:'Light threshold', details:`${miles} mi total with 20 min steady T/M blend. T: ${zones.T}, M: ${zones.M}`, purpose:'Aerobic strength without taking away from the long run.'};
        return {type:'M', label:'Marathon pace block', details:`${miles} mi total with 2 × 3 mi at M effort if fresh. M: ${zones.M}`, purpose:'Race-specific work appears only after foundation and threshold.'};
      }
      if(focus==='5k' || focus==='10k'){
        if(isSecond) return {type:'T', label:'Controlled tempo', details:`${miles} mi total with 20 min T. T: ${zones.T}`, purpose:'Do not replace aerobic strength with too much interval work.'};

      }
      if(focus==='half'){
        if(isSecond) return {type:'Strides', label:'Easy + strides', details:`${miles} mi E + 6 × 20 sec strides`, purpose:'Keep legs quick without fatigue.'};
        return {type:'T', label:'Longer threshold', details:`${miles} mi total with 2 × 12 min T w/ 3 min jog. T: ${zones.T}`, purpose:'Half-marathon fitness is built mostly through threshold durability.'};
      }
      return {type:'T', label:'Threshold fitness', details:`${miles} mi total with 3 × 8 min T. T: ${zones.T}`, purpose:'Default long-term fitness builder.'};
    }
    if(phase.id==='taper'){
      return {type:'T', label:'Rhythm workout', details:`${miles} mi total with 3 × 5 min controlled T, full easy warmup/cooldown`, purpose:'Stay sharp while dropping volume.'};

  function makeWeek(weekIndex, totalWeeks, prevMileage, startMonday, zones){
    const target = mileageForWeek(weekIndex, prevMileage, totalWeeks);
    const phase = phaseFor(weekIndex, totalWeeks, target);
    const longDay = chooseLongRunDay();
    let actualRuns = Math.min(asNum(state.daysPerWeek,5), getAvailableDays().length);
    while(actualRuns>3 && target/actualRuns < 3) actualRuns--;
    actualRuns = Math.max(3, actualRuns);
    let runDays = chooseRunDays(actualRuns, longDay);
    if(!runDays.includes(longDay)) runDays.push(longDay);
    runDays = [...new Set(runDays)].sort((a,b)=>longDayOrder.indexOf(a)-longDayOrder.indexOf(b));
    actualRuns = runDays.length;
    let longRun = computeLongRun(target, weekIndex, phase);
    const minOtherTotal = 3 * Math.max(0, actualRuns-1);
    if(target - longRun < minOtherTotal) longRun = roundHalf(Math.max(4, target - minOtherTotal));
    const workoutDays = chooseWorkoutDays(runDays, longDay, phase, actualRuns);
    const weekStart = addDays(startMonday, weekIndex*7);
    let days = longDayOrder.map(d=>{
      const date = addDays(weekStart, d===0?6:d-1); // Mon=0 offset, Sun=6

    });
    const nonLong = runDays.filter(d=>d!==longDay);
    let remaining = target - longRun;
    let base = {};
    nonLong.forEach(d=>base[d]=3);
    remaining -= 3*nonLong.length;
    const priority = [3,2,4,1,5,6,0].filter(d=>nonLong.includes(d));
    let guard=0;
    while(remaining > .01 && guard<200){
      for(const d of priority){ if(remaining <= .01) break; const add = remaining>=.5 ? .5 : remaining; base[d] += add; remaining -= add; }
      guard++;
    }
    days = days.map(day=>{
      if(!runDays.includes(day.dow)) return day;
      let miles = day.dow===longDay ? longRun : roundHalf(base[day.dow]||3);
      let obj = { ...day, miles, type:'E', label:'Easy', details:`${miles} mi E`, purpose:'Easy aerobic volume.', badges:['E'] };
      if(day.dow===longDay){
        obj = { ...obj, type:'L', label:'Long run', details:`${miles} mi long run`, purpose:'Aerobic endurance. Keep it controlled unless the coach specifically adds quality.', badges:['L'] };
        const longQualityAllowed = ['specific','taper'].includes(phase.id) && miles>=12 && target>=35 && weekIndex>=7 && ['marathon','half'].includes(state.focus);
        if(longQualityAllowed && phase.id!=='taper'){
          if(state.focus==='marathon') obj = { ...obj, type:'L/M', label:'Long run workout', details:`${miles} mi with middle 4–8 mi at steady M effort if fresh. M: ${zones.M}`, purpose:'Long-run quality only after enough base; skip the quality if tired.', badges:['L/M'] };
          if(state.focus==='half') obj = { ...obj, type:'L/T', label:'Long run workout', details:`${miles} mi with final 20 min steady/T-lite if fresh. T: ${zones.T}`, purpose:'Specific endurance without forcing speed early.', badges:['L/T'] };
        }

      const wIndex = workoutDays.indexOf(day.dow);
      if(wIndex>=0){ obj = {...obj, ...workoutFor(phase, state.focus, weekIndex, miles, wIndex>0, zones), badges:[workoutFor(phase, state.focus, weekIndex, miles, wIndex>0, zones).type]}; }
      return obj;
    });
    // rounding exact-ish correction on largest easy day
    const sum = roundHalf(days.reduce((a,d)=>a+d.miles,0));
    const diff = roundHalf(target - sum);
    if(Math.abs(diff)>=.5){
      const candidate = days.filter(d=>d.miles>0 && d.type==='E').sort((a,b)=>b.miles-a.miles)[0] || days.find(d=>d.miles>0 && d.dow!==longDay);
      if(candidate){ candidate.miles = roundHalf(Math.max(3, candidate.miles + diff)); candidate.details = `${candidate.miles} mi ${candidate.type==='E'?'E':candidate.type}`; }
    }
    // manual edits and adaptations
    days = days.map(d=>applyOverrides(d));
    const actualTotal = roundHalf(days.reduce((a,d)=>a+d.miles,0));
    const reason = buildWeekReason(weekIndex, totalWeeks, target, actualTotal, phase, longRun, actualRuns);
    return {weekIndex, start:ymd(weekStart), end:ymd(addDays(weekStart,6)), target, actualTotal, phase, longRun, actualRuns, days, reason};

  function applyOverrides(day){

  function buildWeekReason(i,total,target,actual,phase,longRun,actualRuns){

    parts.push(`${phase.name}: ${phase.why}`);
    if((i+1)%4===0) parts.push('Down week for absorption.');

  }
  function saveEdit(){
    const key=val('editKey'); state.manualEdits[key]={miles:asNum(val('editMiles'),0), type:val('editType'), label: labelFromType(val('editType')), details:val('editDetails'), purpose:val('editPurpose')}; delete state.adaptations[key]; save(); document.getElementById('editDialog').close(); render();
  }
  function clearEdit(){ const key=val('editKey'); delete state.manualEdits[key]; delete state.adaptations[key]; save(); document.getElementById('editDialog').close(); render(); }
  function labelFromType(t){ return {E:'Easy',Strides:'Easy + strides',Hill:'Hill strength',T:'Threshold',I:'Intervals',R:'Repetition',M:'Marathon pace',L:'Long run',Off:'Off'}[t] || t; }
  function jumpWeek(i){ setTab('week'); setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),50); }
  function editWeek(i){ setTab('plan'); }

  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  document.getElementById('quickBuild').onclick=()=>setTab('setup');
  document.getElementById('quickLog').onclick=()=>setTab('log');
  document.getElementById('saveEdit').onclick=saveEdit; document.getElementById('clearEdit').onclick=clearEdit; document.getElementById('closeEdit').onclick=()=>document.getElementById('editDialog').close();
  window.openEdit=openEdit; window.jumpWeek=jumpWeek; window.editWeek=editWeek;
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredInstall=e; const b=document.getElementById('installBtn'); b.classList.remove('hidden'); b.onclick=async()=>{ b.classList.add('hidden'); deferredInstall.prompt(); await deferredInstall.userChoice; deferredInstall=null; }; });
  if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{})); }
  render();
  </script>
</body>
</html>
