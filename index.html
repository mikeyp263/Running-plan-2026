var KEY='runCoachDetailed18',D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],now=new Date(),S=load(),P=[],draft={effort:'normal',pain:'none',sleep:'good'};

function paceSec(p){if(!p)return null;var m=String(p).match(/(\d+):([0-5]?\d)/);return m?Number(m[1])*60+Number(m[2]):null}function secPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeSec(t){if(!t)return null;var a=String(t).split(':'),i,total=0;if(a.length<2)return null;for(i=0;i<a.length;i++){if(isNaN(Number(a[i])))return null;total=total*60+Number(a[i])}return total}function dist(d){var m={mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219};return m[d]||3.107}

function phase(i,m,restart){if(restart&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=42&&i>=10)return'Specific endurance';if(m>=34&&i>=8)return'Threshold + economy';return'Threshold foundation'}function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,pcts=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1],i,target;P=[];for(i=1;i<=16;i++){if(i%4===0||forceDown(i))target=Math.round(P[i-2]?P[i-2].miles*.78:cap*.3);else if(restart&&pcts[i-1])target=Math.round(cap*pcts[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));target=clamp(target,restart?12:10,cap);P.push(makeWeek(i,start,target,restart))}}

6 × 3 min I effort, equal jog','Aerobic power after base.'],['I','K intervals','5 × 1K I, 2–3 min jog','Economy and power.'],['R','Fast relaxed reps','8–10 × 200m relaxed-fast, full recovery','Speed and mechanics.'],['Fartlek','5-4-3-2-1 fartlek','5-4-3-2-1 min hard controlled, equal easy','Strong but not all-out.'],['T','Threshold + strides','20 min T + 6 × 20 sec strides','Threshold then economy.'],['I','2-minute reps','8 × 2 min hard controlled, 2 min jog','Safer I work by time.'],['R','300s relaxed','6–8 × 300m relaxed-fast, full recovery','Repetition economy.'],['I','800 rhythm','6 × 800m I, 2 min jog','Controlled interval rhythm.'],['Fartlek','Mona light','2×90s, 4×60s, 4×30s, 4×15s quick/easy','Speed play.'],['I','4-minute reps','4–5 × 4 min I, 3 min jog','Classic VO2.'],['R','150s smooth','10 × 150m smooth fast, walkback','Form speed.'],['Fartlek','On/off miles','3–4 mi alternating 1 min quick / 1 min easy','Continuous rhythm.']];var specific=[['T','Medium-long T','2 × 15 min T inside a medium run','Specific endurance.'],['M','Steady state','35–45 min steady controlled','Aerobic strength.'],['T','Long cruise set','3 × 10 min T, 2 min jog','Big threshold set.'],['Fartlek','Surge run','10 × 1 min quick during steady run','Economy inside endurance.'],['T','Tempo sandwich','10 min T + easy + 10 min T + easy + 5 min T','Broken tempo.'],['M','Marathon rhythm','3 × 2 mi steady/M effort, 3 min easy','Later specific work.'],['T','Split tempo','15 min T + 10 min T + 5 min T','Controlled fatigue resistance.'],['M','Steady blocks','2 × 20 min steady, 5 min easy','Long aerobic strength.'],['T','Cruise 2Ks','4 × 2K T, 2 min jog','Specific threshold.'],['Fartlek','Late surges','8 × 90 sec quick in second half','Controlled late rhythm.'],['M','Mile steady reps','4–5 × 1 mi steady/M, 90 sec easy','Specific rhythm.'],['T','Tempo finish medium','medium run with last 15 min T feel','Careful finish.']];if(ph==='Aerobic strength')return pick(early,i);if(ph==='Threshold foundation function curWeek(){build();var t=ymd(now),i,j;for(i=0;i<P.length;i++)for(j=0;j<P[i].days.length;j++)if(P[i].days[j].date===t)return P[i];S.start=ymd(new Date());save();build();return P[0]}function todayRun(){var w=curWeek(),t=ymd(now),i;for(i=0;i<w.days.length;i++)if(w.days[i].date===t)return w.days[i];return w.days[0]}function target(r){if(r.type==='Off')return'No run';if(r.type.indexOf('L')===0)return'Long: '+r.pace.LR;if(r.type==='T')return'Threshold: '+r.pace.T;if(r.type==='I')return'Intervals: '+r.pace.I;if(r.type==='M')return'Steady/M: '+r.pace.M;if(r.type==='R')return'Reps: '+r.pace.R;if(r.type==='Fartlek'||r.type==='Hills')return'Controlled by effort';return'Easy: '+r.pace.E}function col(r){if(r.type.indexOf('L')===0)return'blue';if(['T','I','M','Fartlek','Hills','R'].indexOf(r.type)>=0)return'yellow';if(r.type==='Off')return'';return'green'}
function importantMiss(log,planned){var miss=Math.max(0,planned.miles-num(log.miles,0)),share=planned.weekMiles?miss/planned.weekMiles:0;if(log.skipped&&['E','Strides'].indexOf(planned.type)>=0&&share<.10)return false;return log.skipped||share>.15||planned.type.indexOf('L')===0||['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0}function adaptFromLog(log,planned){var tm=ymd(add(dt(log.date),1)),msg='Logged. Plan stays steady.';if(!S.adapt)S.adapt={};if(log.pain==='bad'){S.adapt[tm]={miles:0,type:'Off',name:'Off / pain check',main:'Off or walk only',det:'Off or walk only',why:'Adapted: bad pain logged. No quality.'};msg='Bad pain: tomorrow off / pain check.'}else if(log.pain==='moderate'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.5)),type:'E',name:'Recovery',main:'short easy recovery',det:'short easy recovery',why:'Adapted: moderate pain. Quality removed.'};msg='Moderate pain: tomorrow recovery only.'}else if(log.sleep==='bad'||log.effort==='bad'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.65)),type:'E',name:'Recovery',main:'short easy recovery',det:'short easy recovery',why:'Adapted: bad sleep/effort. Keep it easy.'};msg='Bad sleep/effort: tomorrow downgraded.'}else if(log.skipped){var share=planned.weekMiles?planned.miles/planned.weekMiles:0;if(!importantMiss(log,planned))msg='Missed small easy run under 10% of week. Keep plan the same.';else if(planned.type.indexOf('L')===0){msg='Missed long run. Do not jump next long run.';S.recentLong=Math.min(num(S.recentLong,0)||planned.miles,num(log.miles,0))}else if(['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.7)),type:'E',name:'Easy reset',main:'easy run only',det:'easy run only',why:'Adapted: missed workout. Do not stack quality.'};msg='Missed workout: do not stack. Tomorrow easy.'}else if(share>.15){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.75)),type:'E',name:'Easy adjustment',main:'easy only',det:'easy only',why:'Adapted: larger missed run.'};msg='Larger missed run: small adjustment.'}}S.notes.unshift({date:log.date,msg:msg});S.notes=S.notes.slice(0,6)}function weekStatus(w){var planned=w.miles,logged=loggedMilesThisWeek(),pct=clamp((logged/planned)*100,0,120),remain=Math.max(0,half(planned-logged)),long=w.days.filter(function(x){return x.type.indexOf('L')===0})[0],q=w.days.filter(function(x){return ['T','I','M','Fartlek','Hills','R'].indexOf(x.type)>=0})[0];return{planned:planned,logged:logged,pct:pct,remain:remain,long:long,q:q}}
function render(){build();['today','week','setup','plan','log'].forEach(function(x){document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});tick();renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}function specHTML(r){return'<div class="spec"><div><b>Warm-up:</b> '+r.spec.wu+'</div><div><b>Main:</b> '+r.spec.main+'</div><div><b>Cool-down:</b> '+r.spec.cd+'</div><div><b>Pace:</b> '+r.spec.pace+'</div></div>'}function renderToday(){var r=todayRun(),w=curWeek(),p=paces(w.i),st=weekStatus(w),note=S.notes&&S.notes[0]?S.notes[0].msg:'No adjustment yet.';today.innerHTML='<div class="card hero"><span class="chip">Today · '+fmt(r.date)+'</span><div class="title">'+r.name+'</div><div class="miles">'+r.miles+' <span style="font-size:.42em">mi</span></div><div class="work">'+r.main+'</div></div><div class="card"><div class="sectionTitle">Do this</div><div class="coachLine">'+target(r)+'</div><p>'+r.why+'</p><span class="pill '+col(r)+'">'+r.type+'</span>'+specHTML(r)+'</div><div class="card"><div class="sectionTitle">Week status</div><div class="meterLabels"><span>'+st.logged+' done / '+st.planned+' planned</span><span>'+st.remain+' left</span></div><div class="meter"><div class="fill" style="width:'+st.pct+'%"></div></div><p>Long run: '+(st.long?st.long.miles+' mi '+st.long.day+' ('+Math.round(st.long.miles/st.planned*100)+'%)':'none')+' · Next quality: '+(st.q?st.q.day+' '+st.q.name:'none yet')+'</p></div><div class="card"><div class="sectionTitle">Training status</div><div class="coachLine">'+w.phase+'</div><p>'+(w.down?'Down/adapted week':'Build week')+' · Latest adjustment: '+note+'</p><p>Pace progression: '+(p.prog?('targets nudged '+p.prog+' sec/mi faster from clean recent logs'):'no automatic pace bump')+'</p></div><div class="grid3"><div class="stat"><b>'+p.E+'</b><span>easy</span></div><div class="stat"><b>'+p.T+'</b><span>threshold</span></div><div class="stat"><b>'+p.I+'</b><span>interval</span></div></div>'}function dayHTML(r){var done=S.logs.find(function(l){return l.date===r.date});return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="date">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill '+col(r)+'">'+r.type+'</span><div class="details">'+r.main+'</div><div class="target">'+(done?'Logged '+done.miles+' mi · ':'')+target(r)+'</div>'+specHTML(r)+'</div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=curWeek(),s='<div class="card"><div class="sectionTitle">This week</div><div class="coachLine">'+w.miles+' mi · '+w.phase+'</div><p>'+(w.down?'Down/adapted week':'Build week')+' · all paces use current fitness only.</p></div><div class="card">';for(var i=0;i<w.days.length;i++)s+=dayHTML(w.days[i]);week.innerHTML=s+'</div>'}function renderPlan(){var s='';for(var i=0;i<P.length;i++){s+='<div class="card"><h2>Week '+P[i].i+': '+P[i].miles+' mi</h2><p>'+P[i].phase+(P[i].down?' · down/adapted':'')+'</p>';for(var j=0;j<P[i].days.length;j++){if(P[i].days[j].type!=='Off')s+='<p><b>'+P[i].days[j].day+'</b> · '+P[i].days[j].name+' · '+P[i].days[j].main+' · '+target(P[i].days[j])+'</p>'}s+='</div>'}plan.innerHTML=s}function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Recent comfortable long run, 0 ok</label><input id="recentLong" type="number" step=".5" value="'+S.recentLong+'"></div><div class="field"><label>Run days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div><div class="field"><label>Long run day</label><select id="longDay"><option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option><option value="0">Sun</option></select></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p><button class="primary" onclick="saveSetup()">Save setup</button></div><div class="card"><h2>Paces</h2><p>Paces progress only from current fitness and clean recent logs. Old PRs stay ignored.</p><div class="grid"><button class="choice '+(S.fitness==='effort'?'active':'')+'" onclick="S.fitness=\'effort\';save();render()"><b>Effort / HR</b><span>Use this if not race fit</span></button><button class="choice '+(S.fitness==='easy'?'active':'')+'" onclick="S.fitness=\'easy\';save();render()"><b>Easy pace</b><span>Enter current easy pace</span></button><button class="choice '+(S.fitness==='test'?'active':'')+'" onclick="S.fitness=\'test\';save();render()"><b>Current test</b><span>Recent time trial only</span></button><button class="choice"><b>Old PRs ignored</b><span>15:18 / 4:12 are history only</span></button></div><div class="grid" style="margin-top:12px"><div class="field"><label>Easy pace</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div><div class="field"><label>Test distance</label><select id="testDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field"><label>Test time</label><input id="testTime" value="'+S.testTime+'" placeholder="20:30"></div></div><button class="primary" onclick="saveSetup()" style="margin-top:12px">Save paces</button></div>';document.getElementById('days').value=S.days;document.getElementById('longDay').value=S.longDay;document.getElementById('testDist').value=S.testDist}function saveSetup(){S.current=num(cur.value,0);S.cap=num(cap.value,60);S.recentLong=num(document.getElementById('recentLong').value,0);S.days=num(document.getElementById('days').value,5);S.longDay=num(document.getElementById('longDay').value,6);S.easy=easy.value;S.testDist=testDist.value;S.testTime=testTime.value;S.start=ymd(new Date());save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.main+'</p><div class="field"><label>Miles completed</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><p>Feel</p><div class="seg"><button onclick="pickLog(\'effort\',\'easy\')">Easy</button><button onclick="pickLog(\'effort\',\'normal\')">Normal</button><button onclick="pickLog(\'effort\',\'hard\')">Hard</button><button onclick="pickLog(\'effort\',\'bad\')">Bad</button></div><p>Pain</p><div class="seg"><button onclick="pickLog(\'pain\',\'none\')">None</button><button onclick="pickLog(\'pain\',\'mild\')">Mild</button><button onclick="pickLog(\'pain\',\'moderate\')">Mod</button><button onclick="pickLog(\'pain\',\'bad\')">Bad</button></div><p>Sleep</p><div class="seg"><button onclick="pickLog(\'sleep\',\'good\')">Good</button><button onclick="pickLog(\'sleep\',\'okay\')">Ok</button><button onclick="pickLog(\'sleep\',\'bad\')">Bad</button><button onclick="skipRun()">Skipped</button></div><button class="primary" onclick="saveLog(false)">Save + adapt</button></div><div class="card"><h2>Recent</h2>'+recent()+'</div>';refresh()}function pickLog(k,v){draft[k]=v;refresh()}function refresh(){var b=document.querySelectorAll('.seg button'),i,t;for(i=0;i<b.length;i++){t=b[i].textContent.toLowerCase();b[i].className='';if(t.indexOf(draft.effort)===0||t.indexOf(draft.pain)===0||t.indexOf(draft.sleep)===0)b[i].className='active'}}function saveLog(skipped){var planned=todayRun(),m=skipped?0:num(lm.value,0),log={date:ymd(now),planned:planned.main,plannedMiles:planned.miles,weekMiles:planned.weekMiles,type:planned.type,miles:m,effort:skipped?'bad':draft.effort,pain:draft.pain,sleep:draft.sleep,skipped:skipped};S.logs=S.logs.filter(function(l){return l.date!==log.date});S.logs.push(log);adaptFromLog(log,planned);save();tab('today')}function skipRun(){saveLog(true)}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';var s='',i;for(i=S.logs.length-1;i>=0&&i>S.logs.length-7;i--)s+='<p><b>'+S.logs[i].date+'</b> · '+S.logs[i].miles+' mi · '+(S.logs[i].skipped?'skipped':S.logs[i].effort)+' · pain '+S.logs[i].pain+'</p>';return s}function importantMiss(log,planned){var miss=Math.max(0,planned.miles-num(log.miles,0)),share=planned.weekMiles?miss/planned.weekMiles:0;if(log.skipped&&['E','Strides'].indexOf(planned.type)>=0&&share<.10)return false;return log.skipped||share>.15||planned.type.indexOf('L')===0||['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0}function adaptFromLog(log,planned){var tm=ymd(add(dt(log.date),1)),msg='Logged. Plan stays steady.';if(!S.adapt)S.adapt={};if(log.pain==='bad'){S.adapt[tm]={miles:0,type:'Off',name:'Off / pain check',main:'Off or walk only',det:'Off or walk only',why:'Adapted: bad pain logged. No quality.'};msg='Bad pain: tomorrow off / pain check.'}else if(log.pain==='moderate'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.5)),type:'E',name:'Recovery',main:'short easy recovery',det:'short easy recovery',why:'Adapted: moderate pain. Quality removed.'};msg='Moderate pain: tomorrow recovery only.'}else if(log.sleep==='bad'||log.effort==='bad'){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.65)),type:'E',name:'Recovery',main:'short easy recovery',det:'short easy recovery',why:'Adapted: bad sleep/effort. Keep it easy.'};msg='Bad sleep/effort: tomorrow downgraded.'}else if(log.skipped){var share=planned.weekMiles?planned.miles/planned.weekMiles:0;if(!importantMiss(log,planned))msg='Missed small easy run under 10% of week. Keep plan the same.';else if(planned.type.indexOf('L')===0){msg='Missed long run. Do not jump next long run.';S.recentLong=Math.min(num(S.recentLong,0)||planned.miles,num(log.miles,0))}else if(['T','I','M','Fartlek','Hills','R'].indexOf(planned.type)>=0){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.7)),type:'E',name:'Easy reset',main:'easy run only',det:'easy run only',why:'Adapted: missed workout. Do not stack quality.'};msg='Missed workout: do not stack. Tomorrow easy.'}else if(share>.15){S.adapt[tm]={miles:Math.max(3,half(planned.miles*.75)),type:'E',name:'Easy adjustment',main:'easy only',det:'easy only',why:'Adapted: larger missed run.'};msg='Larger missed run: small adjustment.'}}S.notes.unshift({date:log.date,msg:msg});S.notes=S.notes.slice(0,6)}function weekStatus(w){var planned=w.miles,logged=loggedMilesThisWeek(),pct=clamp((logged/planned)*100,0,120),remain=Math.max(0,half(planned-logged)),long=w.days.filter(function(x){return x.type.indexOf('L')===0})[0],q=w.days.filter(function(x){return ['T','I','M','Fartlek','Hills','R'].indexOf(x.type)>=0})[0];return{planned:planned,logged:logged,pct:pct,remain:remain,long:long,q:q}}
