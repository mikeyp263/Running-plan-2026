</style></head><body><div class="app"><header><div class="top"><div class="logo"><div class="mark">↗</div><div><div class="brand">Run Coach</div><div class="sub">daily plan, simple logging</div></div></div><button id="installBtn" class="small hidden">Install</button></div><nav class="tabs"><button class="tab active" data-tab="today">Today</button><button class="tab" data-tab="week">Week</button><button class="tab" data-tab="setup">Setup</button><button class="tab" data-tab="plan">Plan</button><button class="tab" data-tab="log">Log</button></nav></header><section id="today" class="view"></section><section id="week" class="view hidden"></section><section id="setup" class="view hidden"></section><section id="plan" class="view hidden"></section><section id="log" class="view hidden"></section></div><div class="bottom"><div class="bottomInner"><button id="logBtn" class="primary">Log</button><button id="setupBtn">Setup</button></div></div><dialog id="editDialog"><div class="modal"><h2>Edit run</h2><input id="editKey" type="hidden"><div class="grid"><div class="field"><label>Miles</label><input id="editMiles" type="number" min="0" step="0.5"></div><div class="field"><label>Type</label><select id="editType"><option>E</option><option>Strides</option><option>L</option><option>T</option><option>Fartlek</option><option>Hills</option><option>I</option><option>M</option><option>Off</option></select></div></div><div class="field"><label>Workout</label><input id="editWorkout"></div><div class="field"><label>Note</label><textarea id="editPurpose"></textarea></div><div class="row"><button class="primary" id="saveEdit">Save</button><button class="danger" id="clearEdit">Clear</button><button class="ghost" id="closeEdit">Cancel</button></div></div></dialog><script>
const STORE='runCoachModern.v4',DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],today=new Date();
const def={tab:'today',start:ymd(today),mode:'rolling',raceDate:'',focus:'rebuild',current:0,cap:60,recentLong:0,days:5,noRun:[0],fitness:'effort',easyPace:'',timeTrialDist:'5K',timeTrialTime:'',oldPR:'15:18 5K / 4:12 mile — history only',logs:[],manual:{},adapt:{},ready:false};
let state=load(),plan=[],installPrompt=null,logDraft={effort:'normal',pain:'none',sleep:'good'};
function load(){try{return {...def,...JSON.parse(localStorage.getItem(STORE)||'{}')}}catch(e){return {...def}}}function save(){localStorage.setItem(STORE,JSON.stringify(state))}function ymd(d){let x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function date(s){let d=new Date(s+'T12:00:00');return isNaN(d)?new Date():d}function add(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){let x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}const n=(v,f=0)=>{let x=parseFloat(v);return isNaN(x)?f:x},clamp=(x,a,b)=>Math.max(a,Math.min(b,x)),half=x=>Math.round(x*2)/2;function fmt(d){return date(d).toLocaleDateString([],{month:'short',day:'numeric'})}function paceToSec(p){if(!p)return null;let m=String(p).match(/(\d+):([0-5]?\d)/);return m?+m[1]*60+ +m[2]:null}function secToPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeToSec(t){if(!t)return null;let a=String(t).trim().split(':').map(Number);if(a.some(isNaN))return null;return a.length===3?a[0]*3600+a[1]*60+a[2]:a[0]*60+a[1]}function distMiles(d){return{mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219}[d]||3.107}
function paces(){let easy=paceToSec(state.easyPace),race=timeToSec(state.timeTrialTime),dist=distMiles(state.timeTrialDist);if(state.fitness==='easy'&&easy)return{src:'Easy pace',E:secToPace(easy),LR:secToPace(easy+15),T:secToPace(easy-75),I:secToPace(easy-105),steady:secToPace(easy-35),hr:'65–78% HRmax'};if(state.fitness==='race'&&race){let five=race*Math.pow(3.107/dist,1.06),p=five/3.107;return{src:'Current time trial',E:secToPace(p+105),LR:secToPace(p+120),T:secToPace(p+28),I:secToPace(p+5),steady:secToPace(p+60),hr:'65–78% HRmax'}}return{src:'Effort / HR',E:'conversational',LR:'easy relaxed',T:'comfortably hard',I:'hard controlled',steady:'steady controlled',hr:'65–78% HRmax'}}
function build(){let start=mon(date(state.start||ymd(today))),weeks=state.mode==='race'&&state.raceDate?clamp(Math.ceil((date(state.raceDate)-start)/6048e5),8,32):16,cap=n(state.cap,60),cur=n(state.current,0),restart=cur===0,base=restart?Math.min(18,Math.max(12,Math.round(cap*.25))):cur;plan=[];for(let i=1;i<=weeks;i++){let down=i%4===0,taper=state.mode==='race'&&i>weeks-3,target;if(taper){let peak=Math.max(...plan.map(w=>w.miles),base);target=i===weeks?Math.round(peak*.45):Math.round(peak*(i===weeks-1?.62:.78))}else if(down){target=Math.round(plan[i-2].miles*.78)}else{let pct=restart?[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1][i-1];target=pct?Math.round(cap*pct):Math.min(cap,(plan.at(-1)?.miles||base)+Math.max(4,Math.round(cap*.08)))}target=clamp(target,restart?12:Math.max(10,cur*.75),cap);plan.push(makeWeek(i,start,target,weeks,down,taper,restart))}return plan}
function phase(i,m,weeks,taper,restart){if(taper)return'Taper';if(restart&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=38&&i>=9)return state.focus==='marathon'?'Specific endurance':'Threshold + economy';return'Threshold foundation'}function runDays(){let no=new Set((state.noRun||[0]).map(Number)),days=[1,2,3,4,5,6,0].filter(d=>!no.has(d));return days.slice(0,clamp(n(state.days,5),3,6)).sort((a,b)=>a-b)}function longDay(ds){return ds.includes(6)?6:ds.at(-1)}
function makeWeek(i,start,total,weeks,down,taper,restart){let p=paces(),ds=runDays(),ld=longDay(ds),ph=phase(i,total,weeks,taper,restart),q=!taper&&i>=6&&total>=28,hard=ds.includes(2)?2:ds[0],longBase=n(state.recentLong,0),lr=half(clamp(restart?Math.min(total*.25,4+i*.8+(longBase?longBase*.15:0)):Math.min(total*.28,Math.max(longBase+Math.ceil(i*.8),7)),total>=20?5:4,Math.min(16,total*.3)));if(taper)lr=half(total*(i===weeks?.22:.26));let normal=ds.filter(d=>d!==ld),vals={},rem=total-lr,min=total<18?3:4;normal.forEach(d=>{vals[d]=min;rem-=min});if(rem<0){normal.forEach(d=>vals[d]=half(total*.72/normal.length));rem=0}normal.forEach((d,idx)=>vals[d]=half(vals[d]+(idx%2?Math.floor(rem/normal.length):Math.ceil(rem/normal.length))));vals[ld]=lr;let diff=half(total-Object.values(vals).reduce((a,b)=>a+b,0));vals[ld]=half(vals[ld]+diff);let out=[];for(let d=0;d<7;d++){let dt=ymd(add(start,(i-1)*7+d)),m=vals[d]||0,type='Off',label='Off',details='Off',purpose='Recover.';if(m>0){type='E';label='Easy';details=`${m} mi easy`;purpose=`Pace ${p.E}. HR ${p.hr}.`;if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';label='Easy + strides';details=`${m} mi easy + 4–8 × 20 sec strides`;purpose=`Easy pace ${p.E}. Strides fast relaxed, full recovery.`}if(q&&d===hard){let w=workout(i,total,ph,p);type=w.type;label=w.label;details=w.details;purpose=w.purpose}if(d===ld){type='L';label='Long run';details=`${m} mi long`;purpose=`Pace ${p.LR}. Keep it controlled.`;let l=longWorkout(i,total,ph,p,taper);if(l){type='L/'+l.type;details=`${m} mi incl. ${l.details}`;purpose=l.purpose}}}let day={date:dt,day:DOW[d],miles:half(m),type,label,details,purpose,phase:ph,pace:p};if(state.adapt[dt])day={...day,...state.adapt[dt],adapted:true};if(state.manual[dt])day={...day,...state.manual[dt],manual:true};out.push(day)}return{i,miles:half(out.reduce((a,d)=>a+d.miles,0)),phase:ph,down,taper,days:out,why:taper?'Taper: less volume, keep rhythm.':down?'Down week: absorb the block.':restart&&i<=3?'Restart: real runs, no workouts yet.':`${ph}: workouts unlock only when mileage supports them.`}}
function workout(i,m,ph,p){if(ph==='Aerobic strength')return{type:'Fartlek',label:'Fartlek',details:'8–10 × 1 min on / 1 min easy',purpose:`Controlled aerobic power. On reps ${p.I} effort, not all-out.`};if(ph==='Threshold foundation')return{type:'T',label:'Threshold',details:'4–6 × 5 min T, 90 sec jog',purpose:`T pace ${p.T}. Controlled.`};if(ph==='Threshold + economy')return i%2?{type:'T',label:'Threshold reps',details:'5–6 × 1K T or 3–4 × 1 mi T',purpose:`T pace ${p.T}.`}:{type:'I',label:'Intervals',details:'5 × 3 min hard, equal jog',purpose:`I effort ${p.I}. Only after base.`};return{type:'T',label:'Strength tempo',details:'2 × 12–15 min T',purpose:`T pace ${p.T}.`}}function longWorkout(i,m,ph,p,taper){if(taper||m<42||i<9)return null;if(state.focus==='marathon')return{type:'M',details:'last 20–35 min steady / M effort',purpose:`Late long-run quality. Steady ${p.steady}.`};return{type:'Progression',details:'last 2–4 mi steady',purpose:`Controlled finish. Steady ${p.steady}.`}}
function weekNow(){build();let t=ymd(today);return plan.find(w=>w.days.some(d=>d.date===t))||plan[0]}function todayRun(){let t=ymd(today);return weekNow().days.find(d=>d.date===t)||weekNow().days.find(d=>d.miles>0)||weekNow().days[0]}function badge(d){if(d.manual)return'purple';if(d.adapted)return'red';if(String(d.type).includes('L'))return'blue';if(['T','I','M','Fartlek','Hills'].some(x=>String(d.type).includes(x)))return'yellow';if(d.type==='Off')return'';return'green'}
function render(){build();document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(state.tab).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function setTab(t){state.tab=t;save();render();scrollTo({top:0,behavior:'smooth'})}
function renderToday(){let d=todayRun(),w=weekNow(),p=paces(),pct=clamp(w.miles/(n(state.cap,60)||60)*100,4,100);document.getElementById('today').innerHTML=`<div class="todayCard"><span class="datechip">${fmt(d.date)} · ${d.phase}</span><div class="title">${d.label}</div><div class="miles">${d.miles}<span style="font-size:.42em;letter-spacing:-.04em"> mi</span></div><div class="workoutText">${d.details}</div></div><div class="card paceBox"><div><div class="paceBig">${targetLine(d,p)}</div><p>${d.purpose}</p></div><span class="pill ${badge(d)}">${d.type}</span></div><div class="card"><div class="barTop"><span>This week: ${w.miles} mi</span><span>Cap: ${state.cap||60}</span></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div class="targetGrid"><div class="target"><b>${p.E}</b><span>easy pace</span></div><div class="target"><b>${p.hr}</b><span>easy HR</span></div><div class="target wide"><b>${w.phase}</b><span>current phase</span></div></div></div><div class="row"><button class="primary" onclick="setTab('log')">Quick log</button><button class="ghost" onclick="openEdit('${d.date}')">Edit today</button></div>`}
function targetLine(d,p){if(d.type==='Off')return'No run';if(String(d.type).includes('T'))return`T: ${p.T}`;if(String(d.type).includes('I')||String(d.type).includes('Fartlek'))return`Hard: ${p.I}`;if(String(d.type).includes('L'))return`Long: ${p.LR}`;return`Easy: ${p.E}`}
function renderWeek(){let w=weekNow();document.getElementById('week').innerHTML=`<div class="card"><h2>${w.miles} mi week</h2><p>${w.why}</p>${w.days.map(dayHtml).join('')}</div>`}function dayHtml(d){return`<div class="day"><div><div class="dow">${d.day}</div><div class="dte">${fmt(d.date)}</div></div><div class="dMain"><b>${d.label}</b> <span class="pill ${badge(d)}">${d.type}</span><div class="dDetails">${d.details}</div><div class="dPurpose">${targetLine(d,d.pace)}</div><button class="small ghost" onclick="openEdit('${d.date}')" style="margin-top:8px">Edit</button></div><div class="dMi">${d.miles} mi</div></div>`}
function renderPlan(){document.getElementById('plan').innerHTML=`<div class="card"><h2>Plan</h2><p>Down weeks every 4th week. Quality unlocks after foundation.</p></div>${plan.map(w=>`<div class="weekCard"><div class="row" style="justify-content:space-between"><div><b>Week ${w.i}: ${w.miles} mi</b><p>${w.phase}</p></div><span class="pill ${w.down?'yellow':w.taper?'purple':'green'}">${w.down?'Down':w.taper?'Taper':'Build'}</span></div>${w.days.map(d=>`<div class="miniDay"><b>${d.day}</b><div><b>${d.label}</b><span> · ${d.details}</span></div><div class="right"><b>${d.miles}</b></div></div>`).join('')}</div>`).join('')}`}
function renderSetup(){let days=[0,1,2,3,4,5,6];document.getElementById('setup').innerHTML=`<div class="card"><h2>Setup</h2><p>Only set what matters. The app decides the week.</p><div class="choiceGrid"><button class="choice ${state.mode==='rolling'?'active':''}" onclick="state.mode='rolling';save();render()"><b>No race</b><span>Rolling fitness</span></button><button class="choice ${state.mode==='race'?'active':''}" onclick="state.mode='race';save();render()"><b>Race</b><span>Specific plan + taper</span></button></div></div><div class="card"><div class="grid"><div class="field"><label>Focus</label><select id="focus"><option value="rebuild">Rebuild</option><option value="5k">5K</option><option value="10k">10K</option><option value="half">Half</option><option value="marathon">Marathon</option></select></div><div class="field ${state.mode==='race'?'':'hidden'}"><label>Race date</label><input id="raceDate" type="date" value="${state.raceDate}"></div><div class="field"><label>Current mileage, 0 ok</label><input id="current" type="number" min="0" value="${state.current}"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" min="20" value="${state.cap}"></div><div class="field"><label>Comfortable long run, 0 ok</label><input id="recentLong" type="number" min="0" step="0.5" value="${state.recentLong}"></div><div class="field"><label>Run days / week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div></div><p>Off days</p><div class="days">${days.map(d=>`<button class="daypick ${(state.noRun||[]).includes(d)?'active':''}" onclick="toggleNoRun(${d})">${DOW[d]}</button>`).join('')}</div></div><div class="card"><h2>Pace</h2><div class="choiceGrid"><button class="choice ${state.fitness==='effort'?'active':''}" onclick="state.fitness='effort';save();render()"><b>Effort / HR</b><span>Best right now</span></button><button class="choice ${state.fitness==='easy'?'active':''}" onclick="state.fitness='easy';save();render()"><b>Easy pace</b><span>I know my easy pace</span></button><button class="choice ${state.fitness==='race'?'active':''}" onclick="state.fitness='race';save();render()"><b>Current test</b><span>Recent real fitness</span></button><button class="choice"><b>Old PRs ignored</b><span>${state.oldPR}</span></button></div><div class="grid" style="margin-top:12px"><div class="field ${state.fitness==='easy'?'':'hidden'}"><label>Easy pace</label><input id="easyPace" placeholder="8:00" value="${state.easyPace}"></div><div class="field ${state.fitness==='race'?'':'hidden'}"><label>Distance</label><select id="timeTrialDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field ${state.fitness==='race'?'':'hidden'}"><label>Time</label><input id="timeTrialTime" placeholder="20:30" value="${state.timeTrialTime}"></div></div><div class="row"><button class="primary" onclick="saveSetup()">Build</button><button class="danger" onclick="resetAll()">Reset</button></div></div>`;setVal('focus',state.focus);setVal('days',state.days);setVal('timeTrialDist',state.timeTrialDist)}
function renderLog(){let d=todayRun();document.getElementById('log').innerHTML=`<div class="card"><h2>Quick log</h2><p>${d.label} · ${d.details}</p><div class="field"><label>Miles</label><input id="logMiles" type="number" step="0.5" value="${d.miles}"></div><p>How did it feel?</p><div class="seg"><button onclick="pick('effort','easy')">Easy</button><button onclick="pick('effort','normal')" class="active">Normal</button><button onclick="pick('effort','hard')">Hard</button><button onclick="pick('effort','bad')">Bad</button></div><p>Pain?</p><div class="seg"><button onclick="pick('pain','none')" class="active">None</button><button onclick="pick('pain','mild')">Mild</button><button onclick="pick('pain','moderate')">Mod</button><button onclick="pick('pain','bad')">Bad</button></div><p>Sleep?</p><div class="seg seg3"><button onclick="pick('sleep','good')" class="active">Good</button><button onclick="pick('sleep','okay')">Ok</button><button onclick="pick('sleep','bad')">Bad</button></div><div class="field"><label>Note optional</label><textarea id="logNotes" placeholder="Optional"></textarea></div><div class="row"><button class="primary" onclick="saveLog()">Save + adapt</button><button onclick="quickComplete('skip')" class="ghost">Skipped</button></div></div><div class="card"><h2>Recent</h2>${state.logs.slice(-6).reverse().map(l=>`<p><b>${l.date}</b> · ${l.miles} mi · ${l.effort} · pain ${l.pain}</p>`).join('')||'<p>No logs yet.</p>'}</div>`;refreshPicks()}
function pick(k,v){logDraft[k]=v;refreshPicks()}function refreshPicks(){document.querySelectorAll('.seg button').forEach(b=>{let txt=b.textContent.toLowerCase();let active=txt.startsWith((logDraft.effort||'').slice(0,3))||txt.startsWith((logDraft.pain||'').slice(0,3))||txt.startsWith((logDraft.sleep||'').slice(0,2));b.classList.toggle('active',active)})}
function setVal(id,v){let el=document.getElementById(id);if(el)el.value=v}function saveSetup(){['focus','raceDate','current','cap','recentLong','days','easyPace','timeTrialDist','timeTrialTime'].forEach(id=>{let el=document.getElementById(id);if(el)state[id]=el.type==='number'?n(el.value,0):el.value});state.ready=true;save();setTab('today')}function toggleNoRun(d){state.noRun=state.noRun||[];state.noRun=state.noRun.includes(d)?state.noRun.filter(x=>x!==d):[...state.noRun,d];if(state.noRun.length>4)state.noRun=state.noRun.filter(x=>x!==d);save();render()}
function openEdit(k){let d=plan.flatMap(w=>w.days).find(x=>x.date===k);if(!d)return;setVal('editKey',k);setVal('editMiles',d.miles);setVal('editType',String(d.type).split('/')[0]);setVal('editWorkout',d.details);setVal('editPurpose',d.purpose);editDialog.showModal()}function saveEdit(){let k=editKey.value;state.manual[k]={miles:n(editMiles.value,0),type:editType.value,label:label(editType.value),details:editWorkout.value,purpose:editPurpose.value};delete state.adapt[k];save();editDialog.close();render()}function clearEdit(){let k=editKey.value;delete state.manual[k];delete state.adapt[k];save();editDialog.close();render()}function label(t){return{E:'Easy',Strides:'Easy + strides',L:'Long run',T:'Threshold',Fartlek:'Fartlek',Hills:'Hill strides',I:'Intervals',M:'Marathon pace',Off:'Off'}[t]||t}
function saveLog(){let d=todayRun(),rpe={easy:3,normal:5,hard:8,bad:9}[logDraft.effort];let log={date:ymd(today),planned:d.details,miles:n(logMiles.value,0),effort:logDraft.effort,rpe,pain:logDraft.pain,sleep:logDraft.sleep,notes:logNotes.value};state.logs=state.logs.filter(l=>l.date!==log.date).concat(log);adaptTomorrow(log);save();setTab('today')}function quickComplete(kind){let d=todayRun(),log={date:ymd(today),planned:d.details,miles:kind==='skip'?0:d.miles,effort:kind==='skip'?'bad':'normal',rpe:kind==='skip'?9:5,pain:'none',sleep:'good',notes:kind};state.logs=state.logs.filter(l=>l.date!==log.date).concat(log);adaptTomorrow(log);save();render()}function adaptTomorrow(log){let tm=ymd(add(today,1)),bad=log.pain==='moderate'||log.pain==='bad'||log.rpe>=8||log.sleep==='bad';if(!bad){delete state.adapt[tm];return}state.adapt[tm]={miles:log.pain==='bad'?0:Math.max(3,Math.round((todayRun().miles||4)*.65)),type:log.pain==='bad'?'Off':'E',label:log.pain==='bad'?'Off':'Recovery',details:log.pain==='bad'?'Off / assess pain':'short easy recovery',purpose:'Adjusted from log. No workout.'}}function resetAll(){if(confirm('Clear everything?')){localStorage.removeItem(STORE);state=load();render()}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));logBtn.onclick=()=>setTab('log');setupBtn.onclick=()=>setTab('setup');saveEdit.onclick=saveEdit;clearEdit.onclick=clearEdit;closeEdit.onclick=()=>editDialog.close();window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;installBtn.classList.remove('hidden');installBtn.onclick=async()=>{installBtn.classList.add('hidden');installPrompt.prompt();await installPrompt.userChoice;installPrompt=null}});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));window.setTab=setTab;window.openEdit=openEdit;window.pick=pick;window.saveLog=saveLog;window.quickComplete=quickComplete;window.saveSetup=saveSetup;window.toggleNoRun=toggleNoRun;window.resetAll=resetAll;render();
</script></body></html>
