</style></head><body><div class="app"><header><div class="brand">↗ Run Coach</div><div class="sub">starts when you say · weekly details · current paces</div><div id="nowLine" class="now"></div><div class="tabs"><button id="btoday" onclick="tab('today')">Today</button><button id="bweek" onclick="tab('week')">Week</button><button id="bsetup" onclick="tab('setup')">Setup</button><button id="bplan" onclick="tab('plan')">Plan</button><button id="blog" onclick="tab('log')">Log</button></div></header><main id="today"></main><main id="week" class="hidden"></main><main id="setup" class="hidden"></main><main id="plan" class="hidden"></main><main id="log" class="hidden"></main></div><div class="bottom"><div><button class="primary" onclick="tab('log')">Log run</button><button onclick="tab('setup')">Setup</button></div></div><script>
var D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],KEY='runCoachStart20',now=new Date(),S=load(),P=[],draft={effort:'normal',pain:'none',sleep:'good'};function nextMon(d){var x=new Date(d);x.setHours(12,0,0,0);var n=(8-x.getDay())%7||7;x.setDate(x.getDate()+n);return x}function def(){return{tab:'today',start:ymd(nextMon(new Date())),current:0,cap:60,days:5,offSun:true,longDay:6,recentLong:0,fitness:'effort',easy:'',testDist:'5K',testTime:'',logs:[],adapt:{},notes:[]}}function load(){var d=def();try{var s=JSON.parse(localStorage.getItem(KEY)||'{}');for(var k in s)d[k]=s[k]}catch(e){}return d}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function ymd(d){var x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function dt(s){return new Date((s||ymd(new Date()))+'T12:00:00')}function add(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){var x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}function num(v,f){var x=parseFloat(v);return isNaN(x)?f:x}function half(x){return Math.round(x*2)/2}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function fmt(s){return dt(s).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}function tick(){now=new Date();nowLine.textContent=now.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'})+' · '+now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}function beforeStart(){var n=new Date(now);n.setHours(12,0,0,0);return n<dt(S.start)}function paceSec(p){var m=String(p||'').match(/(\d+):([0-5]?\d)/);return m?+m[1]*60+ +m[2]:null}function secPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeSec(t){var a=String(t||'').split(':'),x=0;if(a.length<2)return null;for(var i=0;i<a.length;i++){if(isNaN(+a[i]))return null;x=x*60+ +a[i]}return x}function dist(d){return{mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219}[d]||3.107}function cleanBonus(w){var a=S.logs.slice(-10),bad=a.filter(l=>l.effort==='bad'||l.pain==='moderate'||l.pain==='bad').length,good=a.filter(l=>(l.effort==='easy'||l.effort==='normal')&&l.pain==='none').length;if(bad)return 0;return good>=6?Math.min(12,Math.floor((w-1)/4)*3):0}function paces(w){w=w||1;var b=cleanBonus(w),e=paceSec(S.easy),t=timeSec(S.testTime),di=dist(S.testDist);if(S.fitness==='easy'&&e)return{E:secPace(e-b),LR:secPace(e+15-b),M:secPace(e-35-b),T:secPace(e-75-b),I:secPace(e-105-b),R:'fast relaxed',hr:'65–78%',prog:b};if(S.fitness==='test'&&t){var five=t*Math.pow(3.107/di,1.06),p=five/3.107;return{E:secPace(p+105-b),LR:secPace(p+120-b),M:secPace(p+55-b),T:secPace(p+28-b),I:secPace(p+5-b),R:'fast relaxed',hr:'65–78%',prog:b}}return{E:'conversational',LR:'easy relaxed',M:'steady controlled',T:'comfortably hard',I:'hard controlled',R:'fast relaxed',hr:'65–78%',prog:0}}
function runDays(){var base=S.offSun?[1,2,3,4,5,6]:[1,2,3,4,5,6,0],out=[],ld=num(S.longDay,6),want=num(S.days,5);for(var i=0;i<base.length&&out.length<want;i++)out.push(base[i]);if(!out.includes(ld)){if(out.length>=want)out[out.length-1]=ld;else out.push(ld)}return out.sort((a,b)=>a-b)}function phase(i,m,r){if(r&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=42&&i>=10)return'Specific endurance';if(m>=34&&i>=8)return'Threshold + economy';return'Threshold foundation'}function badCount(){var m=mon(now);return S.logs.filter(l=>mon(dt(l.date)).getTime()===m.getTime()&&(l.effort==='bad'||l.pain==='moderate'||l.pain==='bad'||l.sleep==='bad')).length}function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,p=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1];P=[];for(var i=1;i<=16;i++){var target;if(i%4===0||(badCount()>=2&&i===2))target=Math.round((P[i-2]?P[i-2].miles:cap*.3)*.78);else if(restart&&p[i-1])target=Math.round(cap*p[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));P.push(makeWeek(i,start,clamp(target,restart?12:10,cap),restart))}}function pick(a,i){return a[i%a.length]}function lrMiles(total,i,restart,down,prev){var pct=total<18?.22:total<30?.23:total<45?.24:total<60?.25:.26;if(down)pct-=.02;if(restart&&i<=3)pct=Math.min(pct,.22);var raw=total*pct,min=total<18?3.5:total<28?5:6,max=total<18?5:total<30?7:total<45?10.5:total<60?13.5:16;if(prev)raw=Math.min(raw,prev+(down?0:1.5));var lr=half(clamp(raw,min,max));lr=Math.min(lr,half(total*.285));if(total-lr<Math.max(2,S.days-1)*3)lr=half(total-Math.max(2,S.days-1)*3);return Math.max(0,half(lr))}function quality(i,ph,p){var early=[['Fartlek','Controlled fartlek','10 × 1 min on / 1 min easy'],['Hills','Hill circuits','8 × 30 sec hill strong, jog down'],['Fartlek','Minute ladder','1-2-3-2-1 min on, equal easy jog'],['Fartlek','Float fartlek','12 × 45 sec on / 75 sec float'],['Hills','Rolling aerobic run','40 min rolling route + 6 strides']];var th=[['T','Cruise intervals','4–6 × 5 min T, 90 sec jog'],['T','Threshold miles','3–4 × 1 mi T, 60–90 sec jog'],['T','Broken tempo','2 × 12 min T, 3 min easy'],['T','Tempo progression','20–25 min steady to T'],['T','K reps','5–7 × 1K T, 60 sec jog'],['T','Cruise ladder','4-5-6-5-4 min T, 90 sec jog'],['T','Short cruise','8 × 3 min T, 1 min jog']];var eco=[['I','3-minute reps','5–6 × 3 min I, equal jog'],['I','K intervals','5 × 1K I, 2–3 min jog'],['R','Fast relaxed reps','8–10 × 200m relaxed-fast'],['Fartlek','5-4-3-2-1 fartlek','5-4-3-2-1 min hard controlled'],['T','Threshold + strides','20 min T + 6 × 20 sec strides'],['I','2-minute reps','8 × 2 min hard controlled, 2 min jog']];var spec=[['T','Medium-long T','2 × 15 min T inside a medium run'],['M','Steady state','35–45 min steady controlled'],['T','Long cruise set','3 × 10 min T, 2 min jog'],['Fartlek','Surge run','10 × 1 min quick during steady run'],['T','Tempo sandwich','10 min T + easy + 10 min T + easy + 5 min T'],['M','Marathon rhythm','3 × 2 mi steady/M, 3 min easy']];if(ph==='Aerobic strength')return pick(early,i);if(ph==='Threshold foundation')return pick(th,i);if(ph==='Threshold + economy')return pick(i%3===0?eco:th,i);return pick(i%2?spec:th,i)}function longQ(i,total){if(total<46||i<10||i%4!==0)return null;return pick([['Progression','last 2–3 mi steady'],['Steady finish','last 20–25 min steady'],['M rhythm','2 × 10 min steady/M'],['Rolling surge','6–8 × 60 sec relaxed surge']],i)}function makeWeek(i,start,total,restart){var p=paces(i),ds=runDays(),ld=+S.longDay,ph=phase(i,total,restart),down=i%4===0,prev=P.length?P[P.length-1].days.find(x=>x.type[0]==='L'):null,lr=lrMiles(total,i,restart,down,prev?prev.miles:0),rem=half(total-lr),min=total<18?3:4,vals={},normal=[];ds.forEach(d=>{if(d!==ld)normal.push(d)});normal.forEach(d=>{vals[d]=min;rem-=min});for(var j=0;normal.length&&rem>0;j=(j+1)%normal.length){vals[normal[j]]+=.5;rem-=.5}vals[ld]=lr;var out=[];for(var d=0;d<7;d++){var m=vals[d]||0,type='Off',name='Off',main='Off',why='Recovery day.';if(m>0){type='E';name='Easy';main=m+' mi easy';why='Easy '+p.E+' · HR '+p.hr;if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';name='Easy + strides';main=m+' mi easy + 4–8 × 20 sec strides';why='Easy '+p.E+' + relaxed strides'}if(i>=6&&total>=28&&d===2){var q=quality(i,ph,p);type=q[0];name=q[1];main=q[2];why=(type==='T'?'Threshold '+p.T:type==='I'?'Interval '+p.I:type==='M'?'Steady '+p.M:type==='R'?'Fast relaxed':'Controlled effort')}if(d===ld){type='L';name='Long run';main=m+' mi long';why='Long '+p.LR+' · '+Math.round(m/total*100)+'% of week';var l=longQ(i,total);if(l){type='L/'+l[0];name='Long run + '+l[0];main=m+' mi long incl. '+l[1];why='Long '+p.LR+' to '+p.M+' · '+Math.round(m/total*100)+'% of week'}}}var r={date:ymd(add(start,(i-1)*7+d)),day:D[d],miles:half(m),type,name,main,why,phase:ph,pace:p,weekMiles:total,week:i};r.spec=specFor(r);if(S.adapt&&S.adapt[r.date]){Object.assign(r,S.adapt[r.date]);r.spec=specFor(r)}out.push(r)}return{i,miles:half(out.reduce((s,x)=>s+x.miles,0)),phase:ph,days:out,down}}
function specFor(r){var p=r.pace;if(r.type==='Off')return{wu:'Off',main:'Recovery day',cd:'Mobility or walk optional',pace:'No pace target'};if(r.type==='E')return{wu:'First 5–10 min very easy',main:r.miles+' mi relaxed easy',cd:'Last 5 min relaxed',pace:p.E+' · HR '+p.hr};if(r.type==='Strides')return{wu:'10–15 min easy',main:'Easy run + 4–8 × 20 sec strides',cd:'5–10 min easy',pace:'Easy '+p.E+'; strides fast relaxed'};if(r.type[0]==='L')return{wu:'First 1–2 mi very easy',main:r.main,cd:'Last 5–10 min relaxed',pace:r.type==='L'?'Long '+p.LR:'Long '+p.LR+'; quality up to '+p.M};if(r.type==='T')return{wu:'1.5–2 mi easy + 4 strides',main:r.main,cd:'1–2 mi easy',pace:'Threshold '+p.T};if(r.type==='I')return{wu:'2 mi easy + drills/strides',main:r.main,cd:'1.5–2 mi easy',pace:'Interval '+p.I};if(r.type==='M')return{wu:'1–2 mi easy',main:r.main,cd:'1 mi easy',pace:'Steady/M '+p.M};if(r.type==='R')return{wu:'2 mi easy + drills',main:r.main,cd:'1–2 mi easy',pace:'Fast relaxed, never straining'};if(r.type==='Hills')return{wu:'1.5–2 mi easy + drills',main:r.main,cd:'1–2 mi easy',pace:'Strong smooth hill effort'};if(r.type==='Fartlek')return{wu:'1.5–2 mi easy',main:r.main,cd:'1–2 mi easy',pace:'Quick parts controlled; recoveries easy'};return{wu:'Easy warm-up',main:r.main,cd:'Easy cool-down',pace:'Effort controlled'}}function curWeek(){build();var t=ymd(now);if(beforeStart())return P[0];for(var w of P)if(w.days.some(d=>d.date===t))return w;return P[P.length-1]}function todayRun(){var w=curWeek(),t=ymd(now);if(!beforeStart()){var r=w.days.find(d=>d.date===t);if(r)return r}return w.days.find(d=>d.miles>0)||w.days[0]}function target(r){if(r.type==='Off')return'No run';if(r.type[0]==='L')return'Long: '+r.pace.LR;if(r.type==='T')return'Threshold: '+r.pace.T;if(r.type==='I')return'Intervals: '+r.pace.I;if(r.type==='M')return'Steady/M: '+r.pace.M;if(r.type==='R')return'Reps: '+r.pace.R;if(r.type==='Fartlek'||r.type==='Hills')return'Controlled by effort';return'Easy: '+r.pace.E}functi function render(){build();['today','week','setup','plan','log'].forEach(x=>{document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});tick();renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}function renderToday(){var r=todayRun(),w=curWeek(),p=paces(w.i),st=weekStatus(w),pre=beforeStart(),note=S.notes&&S.notes[0]?S.notes[0].msg:'No adjustment yet.';today.innerHTML='<div class="card hero"><span class="chip">'+(pre?'Plan starts · '+fmt(S.start):'Today · '+fmt(r.date))+'</span><div class="title">'+(pre?'Start Monday':r.name)+'</div><div class="miles">'+r.miles+' <span style="font-size:.42em">mi</span></div><div class="work">'+(pre?'First run: '+r.name+' · '+r.main:r.main)+'</div></div><div class="card"><div class="section">Do this</div><div class="coach">'+(pre?'Nothing yet — start on '+fmt(S.start):target(r))+'</div><p>'+r.why+'</p><span class="pill '+col(r)+'">'+r.type+'</span>'+specHTML(r)+'</div><div class="card"><div class="section">Week status</div><p><b>'+st.logged+' done / '+st.planned+' planned</b> · '+st.remain+' left</p><div class="bar"><div class="fill" style="width:'+st.pct+'%"></div></div><p>Long run: '+(st.long?st.long.miles+' mi '+st.long.day+' ('+Math.round(st.long.miles/st.planned*100)+'%)':'none')+' · Next quality: '+(st.q?st.q.day+' '+st.q.name:'none yet')+'</p></div><div class="card"><div class="section">Training status</div><div class="coach">'+w.phase+'</div><p>'+(w.down?'Down/adapted week':'Build week')+' · '+note+'</p><p>Pace progression: '+(p.prog?('targets nudged '+p.prog+' sec/mi faster from clean logs'):'no automatic pace bump')+'</p></div><div class="grid3"><div class="stat"><b>'+p.E+'</b><span>easy</span></div><div class="stat"><b>'+p.T+'</b><span>threshold</span></div><div class="stat"><b>'+p.I+'</b><span>interval</span></div></div>'}function dayHTML(r){var done=S.logs.find(l=>l.date===r.date);return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="date">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill '+col(r)+'">'+r.type+'</span><div class="details">'+r.main+'</div><div class="target">'+(done?'Logged '+done.miles+' mi · ':'')+target(r)+'</div>'+specHTML(r)+'</div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=curWeek();week.innerHTML='<div class="card"><div class="section">This week</div><div class="coach">'+(beforeStart()?'Week 1 starts '+fmt(S.start):w.miles+' mi · '+w.phase)+'</div><p>'+(w.down?'Down/adapted week':'Build week')+' · all paces use current fitness only.</p></div><div class="card">'+w.days.map(dayHTML).join('')+'</div>'}function renderPlan(){plan.innerHTML=P.map(w=>'<div class="card"><h2>Week '+w.i+': '+w.miles+' mi</h2><p>'+w.phase+(w.down?' · down/adapted':'')+'</p>'+w.days.filter(d=>d.type!=='Off').map(d=>'<p><b>'+d.day+'</b> · '+d.name+' · '+d.main+' · '+target(d)+'</p>').join('')+'</div>').join('')}function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Start date</label><input id="startDate" type="date" value="'+S.start+'"></div><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Recent comfortable long run, 0 ok</label><input id="recentLong" type="number" step=".5" value="'+S.recentLong+'"></div><div class="field"><label>Run days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div><div class="field"><label>Long run day</label><select id="longDay"><option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option><option value="0">Sun</option></select></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p><button class="primary" onclick="saveSetup()">Save setup</button></div><div class="card"><h2>Paces</h2><p>Paces progress only from current fitness and clean recent logs. Old PRs stay ignored.</p><div class="grid"><button class="choice '+(S.fitness==='effort'?'active':'')+'" onclick="S.fitness=\'effort\';save();render()"><b>Effort / HR</b><span>Use this if not race fit</span></button><button class="choice '+(S.fitness==='easy'?'active':'')+'" onclick="S.fitness=\'easy\';save();render()"><b>Easy pace</b><span>Enter current easy pace</span></button><button class="choice '+(S.fitness==='test'?'active':'')+'" onclick="S.fitness=\'test\';save();render()"><b>Current test</b><span>Recent time trial only</span></button><button class="choice"><b>Old PRs ignored</b><span>15:18 / 4:12 are history only</span></button></div><div class="grid" style="margin-top:12px"><div class="field"><label>Easy pace</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div><div class="field"><label>Test distance</label><select id="testDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field"><label>Test time</label><input id="testTime" value="'+S.testTime+'" placeholder="20:30"></div></div><button class="primary" onclick="saveSetup()" style="margin-top:12px">Save paces</button></div>';days.value=S.days;longDay.value=S.longDay;testDist.value=S.testDist}function saveSetup(){S.start=startDate.value||ymd(nextMon(new Date()));S.current=num(cur.value,0);S.cap=num(cap.value,60);S.recentLong=num(recentLong.value,0);S.days=num(days.value,5);S.longDay=num(longDay.value,6);S.easy=easy.value;S.testDist=testDist.value;S.testTime=testTime.value;save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.main+'</p><div class="field"><label>Miles completed</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><p>Feel</p><div class="seg"><button onclick="pickLog(\'effort\',\'easy\')">Easy</button><button onclick="pickLog(\'effort\',\'normal\')">Normal</button><button onclick="pickLog(\'effort\',\'hard\')">Hard</button><button onclick="pickLog(\'effort\',\'bad\')">Bad</button></div><p>Pain</p><div class="seg"><button onclick="pickLog(\'pain\',\'none\')">None</button><button onclick="pickLog(\'pain\',\'mild\')">Mild</button><button onclick="pickLog(\'pain\',\'moderate\')">Mod</button><button onclick="pickLog(\'pain\',\'bad\')">Bad</button></div><p>Sleep</p><div class="seg"><button onclick="pickLog(\'sleep\',\'good\')">Good</button><button onclick="pickLog(\'sleep\',\'okay\')">Ok</button><button onclick="pickLog(\'sleep\',\'bad\')">Bad</button><button onclick="skipRun()">Skipped</button></div><button class="primary" onclick="saveLog(false)">Save + adapt</button></div><div class="card"><h2>Recent</h2>'+recent()+'</div>';refresh()}function pickLog(k,v){draft[k]=v;refresh()}function refresh(){document.querySelectorAll('.seg button').forEach(b=>{var t=b.textContent.toLowerCase();b.className=(t.indexOf(draft.effort)===0||t.indexOf(draft.pain)===0||t.indexOf(draft.sleep)===0)?'active':''})}function adaptFromLog(l,p){var msg='Logged. Plan stays steady.',tm=ymd(add(dt(l.date),1));if(l.pain==='bad'){S.adapt[tm]={miles:0,type:'Off',name:'Off / pain check',main:'Off or walk only',why:'Adapted: bad pain logged.'};msg='Bad pain: tomorrow off / pain check.'}else if(l.pain==='moderate'||l.sleep==='bad'||l.effort==='bad'){S.adapt[tm]={miles:Math.max(3,half(p.miles*.6)),type:'E',name:'Recovery',main:'short easy recovery',why:'Adapted: keep it easy.'};msg='Tomorrow downgraded to recovery.'}else if(l.skipped){var share=p.weekMiles?p.miles/p.weekMiles:0;if(['E','Strides'].includes(p.type)&&share<.10)msg='Missed small easy run under 10% of week. Keep plan the same.';else if(p.type[0]==='L')msg='Missed long run. Do not jump next long run.';else if(['T','I','M','Fartlek','Hills','R'].includes(p.type)){S.adapt[tm]={miles:Math.max(3,half(p.miles*.7)),type:'E',name:'Easy reset',main:'easy run only',why:'Missed workout. Do not stack quality.'};msg='Missed workout: tomorrow easy.'}}S.notes.unshift({date:l.date,msg});S.notes=S.notes.slice(0,6)}function saveLog(skipped){var p=todayRun(),m=skipped?0:num(lm.value,0),l={date:ymd(now),planned:p.main,plannedMiles:p.miles,weekMiles:p.weekMiles,type:p.type,miles:m,effort:skipped?'bad':draft.effort,pain:draft.pain,sleep:draft.sleep,skipped};S.logs=S.logs.filter(x=>x.date!==l.date);S.logs.push(l);adaptFromLog(l,p);save();tab('today')}function skipRun(){saveLog(true)}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';return S.logs.slice(-6).reverse().map(l=>'<p><b>'+l.date+'</b> · '+l.miles+' mi · '+(l.skipped?'skipped':l.effort)+' · pain '+l.pain+'</p>').join('')}try{if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()))}catch(e){}setInterval(tick,30000);render();
</script></body></html>
