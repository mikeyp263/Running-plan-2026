<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Run Coach</title><style>body{margin:0;background:#08080a;color:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.app{max-width:900px;margin:auto;padding:14px 14px 112px}header{position:sticky;top:0;z-index:10;background:#08080aee;backdrop-filter:blur(16px);border-bottom:1px solid #27272f;margin:0 -14px 14px;padding:12px 14px}.brand{font-size:26px;font-weight:1000;letter-spacing:-1.2px}.sub,.now,p{color:#a1a1aa}.now{font-weight:900;font-size:14px;margin-top:6px}.tabs{display:flex;gap:8px;margin-top:14px;overflow:auto}button{border:0;border-radius:999px;min-height:46px;padding:12px 15px;background:#1f1f26;color:white;font-weight:900}.active,.primary{background:white;color:#000}.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;margin:12px 0}.hero{background:linear-gradient(135deg,#fff,#bec8dc);color:#030303;border:0;padding:24px}.chip{display:inline-block;background:rgba(255,255,255,.58);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;color:#333}.title{font-size:40px;line-height:1;font-weight:1000;letter-spacing:-2px;margin:18px 0 8px}.miles{font-size:70px;line-height:.9;font-weight:1000;letter-spacing:-5px}.work{font-size:21px;font-weight:850;margin-top:16px}.pace{font-size:31px;font-weight:1000;letter-spacing:-1.3px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#101014;border:1px solid #2b2b34;border-radius:18px;padding:14px}.stat b{font-size:24px;display:block}.stat span{color:#a1a1aa;font-size:11px;text-transform:uppercase;font-weight:1000;letter-spacing:.06em}.bar{height:10px;background:#292932;border-radius:999px;overflow:hidden}.fill{height:100%;background:white;border-radius:999px}.pill{display:inline-block;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;background:rgba(255,255,255,.1)}.green{background:rgba(86,223,143,.18);color:#c8f8d9}.yellow{background:rgba(255,209,92,.18);color:#ffe7a8}.blue{background:rgba(138,180,255,.18);color:#d3e1ff}.purple{background:rgba(190,155,255,.18);color:#eadcff}.day{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:14px 0;border-top:1px solid rgba(255,255,255,.07)}.day:first-child{border-top:0}.dow{font-size:19px;font-weight:1000}.date{font-size:11px;color:#a1a1aa;font-weight:900}.mi{font-size:22px;font-weight:1000;text-align:right}.details{font-size:15px;color:#eee;margin-top:3px}.target{font-size:12px;color:#a1a1aa;margin-top:4px}.field label{display:block;color:#a1a1aa;font-size:12px;font-weight:900;margin-bottom:6px}input,select{width:100%;background:#101014;color:white;border:1px solid #2b2b34;border-radius:16px;padding:13px;font:inherit;min-height:50px}.choice{border:1px solid #2b2b34;background:#111114;border-radius:18px;padding:14px;text-align:left;min-height:72px}.choice.active{background:white;color:#000}.choice span{display:block;color:#a1a1aa;font-size:12px;margin-top:4px}.choice.active span{color:#444}.seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 14px}.seg button{border:1px solid #2b2b34;background:#111114;border-radius:18px;min-height:58px}.seg button.active{background:white;color:#000}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#08080aee;backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottom div{max-width:900px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}@media(max-width:700px){.grid,.grid3{grid-template-columns:1fr}.title{font-size:36px}.miles{font-size:64px}.pace{font-size:28px}.seg{grid-template-columns:repeat(2,1fr)}.day{grid-template-columns:44px 1fr}.mi{grid-column:2;text-align:left}}</style></head><body><div class="app"><header><div class="brand">↗ Run Coach</div><div class="sub">Daniels-style phases · bigger workout rotation · less quality than more</div><div id="nowLine" class="now"></div><div class="tabs"><button id="btoday" onclick="tab('today')">Today</button><button id="bweek" onclick="tab('week')">Week</button><button id="bsetup" onclick="tab('setup')">Setup</button><button id="bplan" onclick="tab('plan')">Plan</button><button id="blog" onclick="tab('log')">Log</button></div></header><main id="today"></main><main id="week" class="hidden"></main><main id="setup" class="hidden"></main><main id="plan" class="hidden"></main><main id="log" class="hidden"></main></div><div class="bottom"><div><button class="primary" onclick="tab('log')">Log</button><button onclick="tab('setup')">Setup</button></div></div><script>
var KEY='runCoachLibrary12',D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],now=new Date(),S=load(),P=[],draft={effort:'normal',pain:'none',sleep:'good'};
function def(){return{tab:'today',start:ymd(new Date()),current:0,cap:60,days:5,offSun:true,longDay:6,fitness:'effort',easy:'',testDist:'5K',testTime:'',logs:[]}}
function load(){var d=def();try{var s=JSON.parse(localStorage.getItem(KEY)||'{}');for(var k in s)d[k]=s[k]}catch(e){}return d}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function ymd(d){var x=new Date(d);x.setHours(12,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function dt(s){var d=new Date((s||ymd(new Date()))+'T12:00:00');return isNaN(d)?new Date():d}function add(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}function mon(d){var x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x}function num(v,f){var x=parseFloat(v);return isNaN(x)?f:x}function half(x){return Math.round(x*2)/2}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function fmt(s){return dt(s).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}function tick(){now=new Date();nowLine.textContent=now.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'})+' · '+now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}function paceSec(p){if(!p)return null;var m=String(p).match(/(\d+):([0-5]?\d)/);return m?Number(m[1])*60+Number(m[2]):null}function secPace(s){if(!s)return'effort';s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'/mi'}function timeSec(t){if(!t)return null;var a=String(t).split(':'),i,total=0;if(a.length<2)return null;for(i=0;i<a.length;i++){if(isNaN(Number(a[i])))return null;total=total*60+Number(a[i])}return total}function dist(d){var m={mile:1,'3K':1.864,'5K':3.107,'8K':4.971,'10K':6.214,Half:13.109,Marathon:26.219};return m[d]||3.107}
function paces(){var e=paceSec(S.easy),t=timeSec(S.testTime),di=dist(S.testDist);if(S.fitness==='easy'&&e)return{E:secPace(e),LR:secPace(e+15),M:secPace(e-35),T:secPace(e-75),I:secPace(e-105),R:'fast relaxed',hr:'65–78%'};if(S.fitness==='test'&&t){var five=t*Math.pow(3.107/di,1.06),p=five/3.107;return{E:secPace(p+105),LR:secPace(p+120),M:secPace(p+55),T:secPace(p+28),I:secPace(p+5),R:'fast relaxed',hr:'65–78%'}}return{E:'conversational',LR:'easy relaxed',M:'steady controlled',T:'comfortably hard',I:'hard controlled',R:'fast relaxed',hr:'65–78%'}}
function days(){var base=S.offSun?[1,2,3,4,5,6]:[1,2,3,4,5,6,0],out=[],i,ld=num(S.longDay,6);for(i=0;i<base.length&&out.length<num(S.days,5);i++)out.push(base[i]);if(out.indexOf(ld)<0){if(out.length>=num(S.days,5))out[out.length-1]=ld;else out.push(ld)}out.sort(function(a,b){return a-b});return out}function phase(i,m,restart){if(restart&&i<=3)return'Restart foundation';if(i<=5)return'Foundation + strides';if(i<=8)return'Aerobic strength';if(m>=42&&i>=10)return'Specific endurance';if(m>=34&&i>=8)return'Threshold + economy';return'Threshold foundation'}
function build(){var start=mon(dt(S.start)),cap=num(S.cap,60),cur=num(S.current,0),restart=cur===0,pcts=[.25,.32,.38,.30,.47,.55,.62,.50,.72,.82,.9,.75,1],i,target;P=[];for(i=1;i<=16;i++){if(i%4===0)target=Math.round(P[i-2].miles*.78);else if(restart&&pcts[i-1])target=Math.round(cap*pcts[i-1]);else target=Math.min(cap,(P.length?P[P.length-1].miles:cur)+Math.max(4,Math.round(cap*.08)));target=clamp(target,restart?12:10,cap);P.push(makeWeek(i,start,target,restart))}}
function pick(arr,i){return arr[i%arr.length]}function quality(i,total,ph,p){var early=[['Fartlek','Controlled fartlek','10 × 1 min on / 1 min easy','Aerobic power without forcing VO2 too early.'],['Hills','Hill circuits','8 × 30 sec hill strong, jog down + easy running','Strength and mechanics. Not sprinting.'],['Fartlek','Minute ladder','1-2-3-2-1 min on, equal easy jog, repeat if smooth','Controlled effort by feel.'],['Fartlek','Float fartlek','12 × 45 sec on / 75 sec float','Rhythm change without track pressure.'],['Hills','Rolling hills','30–40 min easy over rolling hills, relaxed strides after','Strength through terrain.']];var thresh=[['T','Cruise intervals','4–6 × 5 min T, 90 sec jog','Daniels-style threshold volume. Controlled.'],['T','Threshold miles','3–4 × 1 mi T, 60–90 sec jog','Classic cruise reps. Smooth, not a race.'],['T','Broken tempo','2 × 12 min T, 3 min easy','Sustained threshold without overcooking.'],['T','Tempo progression','20–25 min steady to T effort','Gradual progression into threshold.'],['T','K reps','5–7 × 1K T, 60 sec jog','Threshold rhythm and economy.'],['T','Alternating tempo','4 × 6 min T with 2 min steady float','More advanced aerobic strength.'],['T','Two-three-two','2 mi T + 3 min jog + 1 mi T + 3 min jog + 2 mi T','College-style controlled threshold.']];var economy=[['I','3-minute reps','5–6 × 3 min I effort, equal jog','VO2-style work only after base. Controlled.'],['I','K intervals','5 × 1K at I effort, 2–3 min jog','Economy and aerobic power.'],['R','Fast relaxed reps','8–10 × 200m relaxed-fast, full recovery','Repetition speed, smooth mechanics.'],['Fartlek','5-4-3-2-1 fartlek','5-4-3-2-1 min hard controlled, equal easy','Strong but not all out.'],['T','Threshold + strides','20 min T + 6 × 20 sec strides','Threshold first, neuromuscular finish.'],['I','2-minute reps','8 × 2 min hard controlled, 2 min jog','Safer I work by time.']];var specific=[['T','Medium-long T','2 × 15 min T inside a medium run','Specific endurance, controlled.'],['M','Steady state','35–45 min steady controlled inside the run','Aerobic strength without racing.'],['T','Long cruise set','3 × 10 min T, 2 min jog','Big threshold set if the week supports it.'],['Fartlek','Surge run','10 × 1 min quick during steady run','Economy inside endurance.'],['T','Tempo sandwich','10 min T + easy + 10 min T + easy + 5 min T','Controlled broken tempo.'],['M','Marathon rhythm','3 × 2 mi steady/M effort, 3 min easy','Only after mileage supports it.']];if(ph==='Aerobic strength')return pick(early,i);if(ph==='Threshold foundation')return pick(thresh,i);if(ph==='Threshold + economy')return pick(i%3===0?economy:thresh,i);return pick(i%2?specific:thresh,i)}
function longQuality(i,total,ph,p){if(total<44||i<9||i%3!==0)return null;var lib=[['Progression','last 2–4 mi steady','Occasional long-run progression, not every week.'],['Steady finish','last 20–30 min steady controlled','Long-run strength while staying aerobic.'],['M rhythm','2 × 10–15 min steady/M effort','Specific endurance after mileage is stable.'],['Rolling surge','8 × 60 sec relaxed surge in second half','Light neuromuscular work inside long run.'],['Fast finish','last 10–15 min moderate, not hard','Controlled finish only if feeling good.']];return pick(lib,i)}
function makeWeek(i,start,total,restart){var p=paces(),ds=days(),ld=num(S.longDay,6),ph=phase(i,total,restart),lr=half(clamp(Math.min(total*.25,4+i*.8),total>=20?5:4,Math.min(16,total*.3))),rem=total-lr,min=total<18?3:4,vals={},normal=[],j,d;for(j=0;j<ds.length;j++)if(ds[j]!==ld)normal.push(ds[j]);for(j=0;j<normal.length;j++){vals[normal[j]]=min;rem-=min}for(j=0;normal.length&&rem>0;j=(j+1)%normal.length){vals[normal[j]]+=1;rem-=1}vals[ld]=half(lr+rem);var out=[];for(d=0;d<7;d++){var m=vals[d]||0,type='Off',name='Off',det='Off',why='Recovery day.';if(m>0){type='E';name='Easy';det=m+' mi easy';why='Easy '+p.E+' · HR '+p.hr;if(i>=2&&d!==ld&&(d===1||d===4)){type='Strides';name='Easy + strides';det=m+' mi easy + 4–8 × 20 sec strides';why='Easy '+p.E+' + fast relaxed strides.'}if(i>=6&&total>=28&&d===2){var q=quality(i,total,ph,p);type=q[0];name=q[1];det=q[2];why=q[3]+' Pace: '+(type==='T'?p.T:type==='I'?p.I:type==='M'?p.M:type==='R'?p.R:'controlled');}if(d===ld){type='L';name='Long run';det=m+' mi long';why='Long '+p.LR+' · controlled';var l=longQuality(i,total,ph,p);if(l){type='L/'+l[0];name='Long run + '+l[0];det=m+' mi long incl. '+l[1];why=l[2]+' Pace: '+p.LR+' to '+p.M}}}out.push({date:ymd(add(start,(i-1)*7+d)),day:D[d],miles:half(m),type:type,name:name,det:det,why:why,phase:ph,pace:p})}var sum=0;for(j=0;j<out.length;j++)sum+=out[j].miles;return{i:i,miles:half(sum),phase:ph,days:out}}
function curWeek(){build();var t=ymd(now),i,j;for(i=0;i<P.length;i++)for(j=0;j<P[i].days.length;j++)if(P[i].days[j].date===t)return P[i];S.start=ymd(now);save();build();return P[0]}function todayRun(){var w=curWeek(),t=ymd(now),i;for(i=0;i<w.days.length;i++)if(w.days[i].date===t)return w.days[i];return w.days[0]}function target(r){if(r.type==='Off')return'No run';if(r.type.indexOf('L')===0)return'Long: '+r.pace.LR;if(r.type==='T')return'Threshold: '+r.pace.T;if(r.type==='I')return'Intervals: '+r.pace.I;if(r.type==='M')return'Steady/M: '+r.pace.M;if(r.type==='R')return'Reps: '+r.pace.R;if(r.type==='Fartlek'||r.type==='Hills')return'Controlled by effort';return'Easy: '+r.pace.E}function col(r){if(r.type.indexOf('L')===0)return'blue';if(['T','I','M','Fartlek','Hills','R'].indexOf(r.type)>=0)return'yellow';if(r.type==='Off')return'';return'green'}function render(){build();['today','week','setup','plan','log'].forEach(function(x){document.getElementById(x).className=S.tab===x?'':'hidden';document.getElementById('b'+x).className=S.tab===x?'active':''});tick();renderToday();renderWeek();renderSetup();renderPlan();renderLog()}function tab(x){S.tab=x;save();render();scrollTo(0,0)}
function renderToday(){var r=todayRun(),w=curWeek(),p=paces(),pct=clamp(w.miles/num(S.cap,60)*100,4,100);today.innerHTML='<div class="card hero"><span class="chip">Today · '+fmt(r.date)+' · '+r.phase+'</span><div class="title">'+r.name+'</div><div class="miles">'+r.miles+' <span style="font-size:.42em">mi</span></div><div class="work">'+r.det+'</div></div><div class="card"><div class="pace">'+target(r)+'</div><p>'+r.why+'</p><span class="pill '+col(r)+'">'+r.type+'</span></div><div class="card"><div class="row" style="justify-content:space-between"><b>This week: '+w.miles+' mi</b><b>Long run: '+D[num(S.longDay,6)]+'</b><b>Cap '+S.cap+'</b></div><div class="bar" style="margin-top:10px"><div class="fill" style="width:'+pct+'%"></div></div></div><div class="grid3"><div class="stat"><b>'+p.E+'</b><span>easy</span></div><div class="stat"><b>'+p.T+'</b><span>threshold</span></div><div class="stat"><b>'+p.I+'</b><span>interval</span></div></div>'}function dayHTML(r){return'<div class="day"><div><div class="dow">'+r.day+'</div><div class="date">'+fmt(r.date)+'</div></div><div><b>'+r.name+'</b> <span class="pill '+col(r)+'">'+r.type+'</span><div class="details">'+r.det+'</div><div class="target">'+target(r)+'</div></div><div class="mi">'+r.miles+' mi</div></div>'}function renderWeek(){var w=curWeek(),s='<div class="card"><h2>'+w.miles+' mi week</h2><p>'+w.phase+' · Long run '+D[num(S.longDay,6)]+'</p>';for(var i=0;i<w.days.length;i++)s+=dayHTML(w.days[i]);week.innerHTML=s+'</div>'}function renderPlan(){var s='';for(var i=0;i<P.length;i++){s+='<div class="card"><h2>Week '+P[i].i+': '+P[i].miles+' mi</h2><p>'+P[i].phase+'</p>';for(var j=0;j<P[i].days.length;j++){if(P[i].days[j].type!=='Off')s+='<p><b>'+P[i].days[j].day+'</b> · '+P[i].days[j].name+' · '+P[i].days[j].det+'</p>'}s+='</div>'}plan.innerHTML=s}
function renderSetup(){setup.innerHTML='<div class="card"><h2>Setup</h2><div class="grid"><div class="field"><label>Current mileage, 0 ok</label><input id="cur" type="number" value="'+S.current+'"></div><div class="field"><label>Max weekly cap</label><input id="cap" type="number" value="'+S.cap+'"></div><div class="field"><label>Run days per week</label><select id="days"><option>3</option><option>4</option><option>5</option><option>6</option></select></div><div class="field"><label>Long run day</label><select id="longDay"><option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option><option value="0">Sun</option></select></div></div><p><button onclick="toggleSun()">Sunday off: '+(S.offSun?'Yes':'No')+'</button></p><button class="primary" onclick="saveSetup()">Save setup</button></div><div class="card"><h2>Paces</h2><div class="grid"><button class="choice '+(S.fitness==='effort'?'active':'')+'" onclick="S.fitness=\'effort\';save();render()"><b>Effort / HR</b><span>Use this if not race fit</span></button><button class="choice '+(S.fitness==='easy'?'active':'')+'" onclick="S.fitness=\'easy\';save();render()"><b>Easy pace</b><span>Enter current easy pace</span></button><button class="choice '+(S.fitness==='test'?'active':'')+'" onclick="S.fitness=\'test\';save();render()"><b>Current test</b><span>Recent time trial only</span></button><button class="choice"><b>Old PRs ignored</b><span>15:18 / 4:12 are history only</span></button></div><div class="grid" style="margin-top:12px"><div class="field"><label>Easy pace</label><input id="easy" value="'+S.easy+'" placeholder="8:00"></div><div class="field"><label>Test distance</label><select id="testDist"><option>mile</option><option>3K</option><option>5K</option><option>8K</option><option>10K</option><option>Half</option><option>Marathon</option></select></div><div class="field"><label>Test time</label><input id="testTime" value="'+S.testTime+'" placeholder="20:30"></div></div><button class="primary" onclick="saveSetup()" style="margin-top:12px">Save paces</button></div>';document.getElementById('days').value=S.days;document.getElementById('longDay').value=S.longDay;document.getElementById('testDist').value=S.testDist}function saveSetup(){S.current=num(cur.value,0);S.cap=num(cap.value,60);S.days=num(document.getElementById('days').value,5);S.longDay=num(document.getElementById('longDay').value,6);S.easy=easy.value;S.testDist=testDist.value;S.testTime=testTime.value;S.start=ymd(new Date());save();tab('today')}function toggleSun(){S.offSun=!S.offSun;save();renderSetup()}function renderLog(){var r=todayRun();log.innerHTML='<div class="card"><h2>Quick log</h2><p>'+r.name+' · '+r.det+'</p><div class="field"><label>Miles</label><input id="lm" type="number" step=".5" value="'+r.miles+'"></div><p>Feel</p><div class="seg"><button onclick="pick(\'effort\',\'easy\')">Easy</button><button onclick="pick(\'effort\',\'normal\')">Normal</button><button onclick="pick(\'effort\',\'hard\')">Hard</button><button onclick="pick(\'effort\',\'bad\')">Bad</button></div><p>Pain</p><div class="seg"><button onclick="pick(\'pain\',\'none\')">None</button><button onclick="pick(\'pain\',\'mild\')">Mild</button><button onclick="pick(\'pain\',\'moderate\')">Mod</button><button onclick="pick(\'pain\',\'bad\')">Bad</button></div><p>Sleep</p><div class="seg"><button onclick="pick(\'sleep\',\'good\')">Good</button><button onclick="pick(\'sleep\',\'okay\')">Ok</button><button onclick="pick(\'sleep\',\'bad\')">Bad</button><button onclick="quick(\'skipped\')">Skipped</button></div><button class="primary" onclick="saveLog()">Save + adapt</button></div><div class="card"><h2>Recent</h2>'+recent()+'</div>';refresh()}function pick(k,v){draft[k]=v;refresh()}function refresh(){var b=document.querySelectorAll('.seg button'),i,t;for(i=0;i<b.length;i++){t=b[i].textContent.toLowerCase();b[i].className='';if(t.indexOf(draft.effort)===0||t.indexOf(draft.pain)===0||t.indexOf(draft.sleep)===0)b[i].className='active'}}function saveLog(){S.logs.push({date:ymd(now),miles:num(lm.value,0),effort:draft.effort,pain:draft.pain,sleep:draft.sleep});save();tab('today')}function quick(e){S.logs.push({date:ymd(now),miles:0,effort:e,pain:'none',sleep:'good'});save();tab('today')}function recent(){if(!S.logs.length)return'<p>No logs yet.</p>';var s='',i;for(i=S.logs.length-1;i>=0&&i>S.logs.length-7;i--)s+='<p><b>'+S.logs[i].date+'</b> · '+S.logs[i].miles+' mi · '+S.logs[i].effort+' · pain '+S.logs[i].pain+'</p>';return s}try{if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister()})}catch(e){}setInterval(tick,30000);render();
</script></body></html>
